<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script type="text/javascript">
  var welkeZinJuist = new function () {
    let currentIndex = 0;
    let items = [];
    let score = 0;

    // Sound function for correct answers
    function playSuccessSound() {
      try {
        // Create a simple success sound using Web Audio API
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
        oscillator.frequency.setValueAtTime(1000, audioContext.currentTime + 0.1);
        oscillator.frequency.setValueAtTime(1200, audioContext.currentTime + 0.2);
        
        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
        
        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.3);
      } catch (e) {
      }
    }

    // Sound function for wrong answers
    function playErrorSound() {
      try {
        // Create a simple error sound using Web Audio API
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        oscillator.frequency.setValueAtTime(400, audioContext.currentTime);
        oscillator.frequency.setValueAtTime(300, audioContext.currentTime + 0.1);
        oscillator.frequency.setValueAtTime(200, audioContext.currentTime + 0.2);
        
        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
        
        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.3);
      } catch (e) {
      }
    }

    this.init = function () {
      document.getElementById('x_pageDiv').firstChild.style.visibility = 'visible';

      const wrapper = document.getElementById('wzjwrapper');
      if (!wrapper) return;

      // Skip intro text - we don't need it for this quiz
      wrapper.querySelector('.introText').style.display = 'none';
      
      // Get the quiz data directly from the page XML attributes
      const correct = x_currentPageXML.getAttribute('woordItemCorrect')?.trim();
      const option1 = x_currentPageXML.getAttribute('woordItemOption1')?.trim();
      const option2 = x_currentPageXML.getAttribute('woordItemOption2')?.trim();
      const option3 = x_currentPageXML.getAttribute('woordItemOption3')?.trim();

      if (!correct || !option1 || !option2 || !option3) {
        wrapper.querySelector('.quizContainer').innerHTML = '<p style="color:red;">Onvolledige quizgegevens. Vul alle velden in.</p>';
        return;
      }

      // Keep next button always enabled
      const topBtn = document.getElementById('x_nextBtn_top');
      if (topBtn) {
        topBtn.disabled = false;
        topBtn.classList.remove('ui-state-disabled');
        topBtn.setAttribute('aria-disabled', 'false');
      }

      // Since this is a single question quiz, we don't need arrays
      renderQuestion(correct, option1, option2, option3);
    };

    function renderQuestion(correct, option1, option2, option3) {
      const wrapper = document.getElementById('wzjwrapper');
      const container = wrapper.querySelector('.quizContainer');
      container.innerHTML = ''; // clear previous

      const retryTxt = x_currentPageXML.getAttribute('retryBtnTxt') || 'probeer opnieuw';

      // Create array of all options and shuffle them
      const allOptions = [correct, option1, option2, option3];
      const shuffled = allOptions.sort(() => Math.random() - 0.5);

      const matchContainer = document.createElement('div');
      matchContainer.className = 'wzjItemBlock';

      matchContainer.innerHTML = `
        <div class="quizQuestion">Welke zin is juist?</div>
        <div class="optionsVertical"></div>
        <div class="feedback"></div>
        <div class="btnHolder"></div>
        <div class="retryBtnHolder" style="display: none;"></div>
      `;

      const optionsDiv = matchContainer.querySelector('.optionsVertical');
      const feedback = matchContainer.querySelector('.feedback');
      const btnHolder = matchContainer.querySelector('.btnHolder');
      const retryBtnHolder = matchContainer.querySelector('.retryBtnHolder');

      shuffled.forEach((sentence, index) => {
        const button = document.createElement('button');
        button.className = 'optionBtn';
        // Remove literal <p> tags from the text
        const cleanText = sentence.replace(/<p>/g, '').replace(/<\/p>/g, '').trim();
        button.innerText = cleanText;
        button.onclick = () => {
          if (button.classList.contains('disabled')) return;

          const isCorrect = sentence === correct;
          
          if (isCorrect) {
            button.classList.add('correct');
            if (XENITH && XENITH.FEEDBACK && XENITH.FEEDBACK.showSuccess) {
              XENITH.FEEDBACK.showSuccess({
                container: document.getElementById('x_pageDiv'),
                message: 'goed gedaan!',
                showConfetti: true,
                playSound: true
              });
            } else {
              feedback.innerHTML = `
                  <div class="feedback-message">
                      <div class="feedback-content">
                          <span class="feedback-text" style="color: #28a745;">goed gedaan!</span>
                      </div>
                  </div>
              `;
              playSuccessSound();
              confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
              setTimeout(() => confetti.reset(), 1000);
            }
            disableOptions(optionsDiv);
            // Record success centrally (use cleaned sentence as the 'word')
            if (window.wtRecordAttempt) window.wtRecordAttempt('welkeZinJuist', cleanText, true);
          } else {
            button.classList.add('wrong');
            feedback.innerText = 'Helaas, probeer het opnieuw.';
            feedback.style.color = '#dc3545';
            playErrorSound();
            disableOptions(optionsDiv);
            showRetryButton(retryBtnHolder, retryTxt);
            if (window.wtRecordAttempt) window.wtRecordAttempt('welkeZinJuist', cleanText, false, cleanText);
          }
        };
        optionsDiv.appendChild(button);
      });

      container.appendChild(matchContainer);
    }

    function disableOptions(container) {
      const options = container.querySelectorAll('.optionBtn');
      options.forEach(opt => {
        opt.classList.add('disabled');
        opt.style.pointerEvents = 'none';
      });
    }

    function showRetryButton(holder, retryTxt) {
      holder.innerHTML = '';
      const btn = document.createElement('button');
      btn.className = 'retryBtn';
      btn.innerText = retryTxt;
      btn.onclick = () => {
        welkeZinJuist.init();
      };
      holder.style.display = 'block';
      holder.appendChild(btn);
    }

    function showNextButton(holder) {
      const btn = document.createElement('button');
      btn.className = 'retryBtn';
      btn.innerText = 'Opnieuw';
      btn.onclick = () => {
        welkeZinJuist.init();
      };
      holder.appendChild(btn);

      // Enable top next button
      const topBtn = document.getElementById('x_nextBtn_top');
      if (topBtn) {
        topBtn.disabled = false;
        topBtn.classList.remove('ui-state-disabled');
        topBtn.setAttribute('aria-disabled', 'false');
      }
    }
  };

  welkeZinJuist.init();
</script>
