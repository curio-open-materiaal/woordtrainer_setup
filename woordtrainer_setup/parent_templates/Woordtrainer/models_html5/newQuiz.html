<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script type="text/javascript">
  var newQuiz = new function () {
    let currentIndex = 0;
    let items = [];
    let score = 0;

    // Sound function for correct answers
    function playSuccessSound() {
      try {
        // Create a simple success sound using Web Audio API
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
        oscillator.frequency.setValueAtTime(1000, audioContext.currentTime + 0.1);
        oscillator.frequency.setValueAtTime(1200, audioContext.currentTime + 0.2);
        
        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
        
        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.3);
      } catch (e) {
      }
    }

    this.init = function () {
      document.getElementById('x_pageDiv').firstChild.style.visibility = 'visible';

      const wrapper = document.getElementById('wnawrapper');
      if (!wrapper) return;

      const intro = x_currentPageXML.getAttribute('text') || '';
      wrapper.querySelector('.introText').innerHTML = x_addLineBreaks(intro);
      items = Array.from(x_currentPageXML.getElementsByTagName('woordItem'));

      if (items.length === 0) {
        wrapper.querySelector('.matchContainer').innerHTML = '<p style="color:red;">Geen woord-items gevonden.</p>';
        return;
      }

      // Disable next button at the top initially
      const topBtn = document.getElementById('x_nextBtn_top');
      if (topBtn) {
        topBtn.disabled = true;
        topBtn.classList.add('ui-state-disabled');
        topBtn.setAttribute('aria-disabled', 'true');
      }

      currentIndex = 0;
      score = 0;
      renderItem();
    };

    function renderItem() {
      const wrapper = document.getElementById('wnawrapper');
      const container = wrapper.querySelector('.matchContainer');
      container.innerHTML = ''; // clear previous

      const itemXML = items[currentIndex];
      const optionsRaw = itemXML.getAttribute('options') || '';
      const correct = itemXML.getAttribute('correct')?.trim();
      const imageHTML = itemXML.getAttribute('imageHtml') || '';
      const retryTxt = itemXML.getAttribute('retryBtnTxt') || 'probeer opnieuw';

      if (!correct || !optionsRaw || !imageHTML) {
        container.innerHTML = `<p style="color:red;">Fout in item ${currentIndex + 1}. Vul alle velden in.</p>`;
        return;
      }

      const shuffled = optionsRaw.split('|').map(w => w.trim()).sort(() => Math.random() - 0.5);

      const itemBlock = document.createElement('div');
      itemBlock.className = 'wnaItemBlock';

      itemBlock.innerHTML = `
        <div class="imageWrapper">${imageHTML}</div>
        <div class="options"></div>
        <div class="feedback"></div>
        <div class="btnHolder"></div>
      `;

      const optionsDiv = itemBlock.querySelector('.options');
      const feedback = itemBlock.querySelector('.feedback');
      const btnHolder = itemBlock.querySelector('.btnHolder');

      shuffled.forEach(word => {
        const div = document.createElement('div');
        div.className = 'wordBox';
        div.innerText = word;
        div.onclick = () => {
          if (div.classList.contains('disabled')) return;

          const isCorrect = word === correct;
          feedback.innerHTML = `
            <div class="feedback-message">
              <div class="feedback-content">
                <span class="feedback-text" style="color: ${isCorrect ? '#00aa00' : '#cc0000'};">${isCorrect ? 'goed gedaan!' : 'Helaas, probeer het opnieuw.'}</span>
              </div>
            </div>
          `;

          if (isCorrect) {
            score++;
            if (XENITH && XENITH.FEEDBACK && XENITH.FEEDBACK.showSuccess) {
              XENITH.FEEDBACK.showSuccess({
                container: document.getElementById('x_pageDiv'),
                message: 'goed gedaan!',
                showConfetti: true,
                playSound: true
              });
            } else {
              playSuccessSound();
              confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
              setTimeout(() => confetti.reset(), 1000);
            }
            disableOptions(optionsDiv);
            if (window.wtMarkExerciseDone) wtMarkExerciseDone('newQuiz');
            showNextButton(btnHolder);
          } else {
            div.classList.add('wrong');
          }
        };
        optionsDiv.appendChild(div);
      });

      container.appendChild(itemBlock);
    }

    function disableOptions(container) {
      const options = container.querySelectorAll('.wordBox');
      options.forEach(opt => {
        opt.classList.add('disabled');
        opt.style.pointerEvents = 'none';
      });
    }

    function showNextButton(holder) {
      const btn = document.createElement('button');
      btn.className = 'nextButton';
      btn.innerText = currentIndex < items.length - 1 ? 'Volgende' : 'Bekijk resultaat';
      btn.onclick = () => {
        currentIndex++;
        if (currentIndex < items.length) {
          renderItem();
        } else {
          showFinalFeedback();
        }
      };
      holder.appendChild(btn);
    }

    function showFinalFeedback() {
      const wrapper = document.getElementById('wnawrapper');
      const container = wrapper.querySelector('.matchContainer');

      const success = score === items.length;

      // Ensure progress stored once quiz is completed (regardless of success)
      if (window.wtMarkExerciseDone) wtMarkExerciseDone('newQuiz');

      container.innerHTML = `
        <div class="finalFeedback">
          <div class="feedback-message">
            <div class="feedback-content">
              <span class="feedback-text">
                ${success
                  ? "Fantastisch! Je hebt alles goed 🎉"
                  : `Je had ${score} van de ${items.length} goed. Probeer het opnieuw.`
                }
              </span>
            </div>
          </div>
          <button class="resetButton" onclick="woordNaarAfbeelding.init()">Opnieuw</button>
        </div>
      `;

      // Enable top next button if all correct
      const topBtn = document.getElementById('x_nextBtn_top');
      if (topBtn) {
        topBtn.disabled = !success;
        topBtn.classList.toggle('ui-state-disabled', !success);
        topBtn.setAttribute('aria-disabled', !success);
      }
    }
  };

  newQuiz.init();
</script>

  }

  
</style>
