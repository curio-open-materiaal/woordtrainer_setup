<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script type="text/javascript">
    var woordtrainerCategorize = new function () {
      let categories = [];
      let allWords = [];
      let originalZones = {};

      // Sound function for correct answers
      function playSuccessSound() {
        try {
          // Create a simple success sound using Web Audio API
          const audioContext = new (window.AudioContext || window.webkitAudioContext)();
          const oscillator = audioContext.createOscillator();
          const gainNode = audioContext.createGain();
          
          oscillator.connect(gainNode);
          gainNode.connect(audioContext.destination);
          
          oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
          oscillator.frequency.setValueAtTime(1000, audioContext.currentTime + 0.1);
          oscillator.frequency.setValueAtTime(1200, audioContext.currentTime + 0.2);
          
          gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
          
          oscillator.start(audioContext.currentTime);
          oscillator.stop(audioContext.currentTime + 0.3);
        } catch (e) {
        }
      }

      this.init = function () {
        document.getElementById('x_pageDiv').firstChild.style.visibility = 'visible';
        const wrapper = document.getElementById('categorizeWrapper');
        if (!wrapper) return;

        // Title is now hardcoded in HTML, no need to set it dynamically
        categories = [];
        allWords = [];
        originalZones = {};

        for (let i = 1; i <= 4; i++) {
          const input = x_currentPageXML.getAttribute(`categorie${i}`);
          if (input && input.includes(':')) {
            const [label, wordsStr] = input.split(':');
            const words = wordsStr.split(',').map(w => w.trim()).filter(Boolean);
            categories.push({ label: label.trim(), words });
            allWords.push(...words.map(w => ({ word: w, correctCategory: label.trim() })));
          }
        }

        renderUI();
      };

      // Helper function to move word to a specific zone
      function moveWordToZone(word, targetZone) {
        const card = document.querySelector(`.wordCard[data-word="${word}"]`);
        if (card && targetZone) {
          targetZone.appendChild(card);
        }
      }

      function renderUI() {
        const container = document.querySelector('.categorizeContainer');
        container.innerHTML = '';

        // Create mobile-friendly layout
        const layout = document.createElement('div');
        layout.className = 'mobileLayout';

        // Words section
        const wordsSection = document.createElement('div');
        wordsSection.className = 'wordsSection';
        
        const wordsContainer = document.createElement('div');
        wordsContainer.className = 'wordsContainer';

        allWords.sort(() => Math.random() - 0.5).forEach(({ word }) => {
          const item = document.createElement('div');
          item.className = 'wordCard';
          item.innerText = word;
          item.dataset.word = word;
          item.dataset.currentCategory = '';

          // Click to select word
          item.addEventListener('click', () => {
            selectWord(word, item);
          });

          // Touch feedback
          item.addEventListener('touchstart', (e) => {
            item.classList.add('touching');
          });

          item.addEventListener('touchend', (e) => {
            item.classList.remove('touching');
          });

          wordsContainer.appendChild(item);
        });

        wordsSection.appendChild(wordsContainer);
        layout.appendChild(wordsSection);

        // Categories section
        const categoriesSection = document.createElement('div');
        categoriesSection.className = 'categoriesSection';
        categoriesSection.innerHTML = '<div id="instructionText" class="instructionText" style="display: none;">Klik op een categorie om het woord daar te plaatsen</div>';

        categories.forEach(cat => {
          const categoryDiv = document.createElement('div');
          categoryDiv.className = 'categoryDiv';
          categoryDiv.dataset.label = cat.label;
          
          const categoryHeader = document.createElement('div');
          categoryHeader.className = 'categoryHeader';
          categoryHeader.innerText = cat.label;
          
          const categoryWords = document.createElement('div');
          categoryWords.className = 'categoryWords';
          categoryWords.dataset.label = cat.label;
          
          // Click to place selected word in this category
          categoryDiv.addEventListener('click', () => {
            placeWordInCategory(cat.label);
          });
          
          categoryDiv.appendChild(categoryHeader);
          categoryDiv.appendChild(categoryWords);
          categoriesSection.appendChild(categoryDiv);
        });

        layout.appendChild(categoriesSection);

        // Restore check button
        const checkBtn = document.createElement('button');
        checkBtn.innerText = 'controleer antwoorden';
        checkBtn.className = 'checkButton';
        checkBtn.onclick = checkAnswers;

        container.appendChild(layout);
        container.appendChild(checkBtn);
      }

      let selectedWord = null;

      function selectWord(word, item) {
        // If clicking a categorized word, remove it from category and reset
        if (item.dataset.currentCategory) {
          item.dataset.currentCategory = '';
          item.classList.remove('categorized');
          item.classList.remove('selected');
          // Also clear any persistent used-highlights when deselected
          item.classList.remove('used-correct');
          item.classList.remove('used-incorrect');
          
          // Clear any previous selection
          selectedWord = null;
          
          updateCategoryDisplay();
          return;
        }
        
        // Clear previous selection
        document.querySelectorAll('.wordCard').forEach(card => {
          card.classList.remove('selected');
        });
        
        // Select this word
        selectedWord = { word, item };
        item.classList.add('selected');
        
        // Show dropzone modal
        showDropzoneModal(word);
      }

      function placeWordInCategory(categoryLabel) {
        if (!selectedWord) return;
        
        const { word, item } = selectedWord;
        
        // Remove from previous category if any
        item.dataset.currentCategory = categoryLabel;
        item.classList.add('categorized');
        item.classList.remove('selected');
        
        // Clear selection
        selectedWord = null;
        
        // Remove highlights from categories
        document.querySelectorAll('.categoryDiv').forEach(cat => {
          cat.classList.remove('highlighted');
        });
        
        // Hide instruction
        const instructionText = document.getElementById('instructionText');
        if (instructionText) {
          instructionText.style.display = 'none';
        }
        
        updateCategoryDisplay();
      }

      function updateCategoryDisplay() {
        // Clear all category displays
        document.querySelectorAll('.categoryWords, .modalCategoryWords').forEach(div => {
          div.innerHTML = '';
        });

        // Add words to their current categories
        document.querySelectorAll('.wordCard').forEach(card => {
          const word = card.dataset.word;
          const category = card.dataset.currentCategory;
          
          if (category) {
            // Regular version
            const categoryDiv = document.querySelector(`.categoryWords[data-label="${category}"]`);
            if (categoryDiv) {
              const wordSpan = document.createElement('span');
              wordSpan.className = 'categoryWord';
              wordSpan.innerText = word;
              categoryDiv.appendChild(wordSpan);
            }
            
            // Modal version
            const modalCategoryDiv = document.querySelector(`.modalCategoryWords[data-label="${category}"]`);
            if (modalCategoryDiv) {
              const wordSpan = document.createElement('span');
              wordSpan.className = 'modalCategoryWord';
              wordSpan.innerText = word;
              modalCategoryDiv.appendChild(wordSpan);
            }
          }
        });
      }

      function checkAnswers() {
        let correct = 0;
        let total = allWords.length;

        // Clear previous verification states on containers (no longer used)
        document.querySelectorAll('.categoryDiv').forEach(cat => {
          cat.classList.remove('category-correct', 'category-incorrect');
        });

        // Ensure left-list cards are not permanently highlighted
        document.querySelectorAll('.wordCard').forEach(card => {
          card.classList.remove('used-correct');
          card.classList.remove('used-incorrect');
        });

        // Count correct placements and mark left cards briefly only if categorized
        // Left list will be highlighted permanently until next check
        document.querySelectorAll('.wordCard').forEach(card => {
          const word = card.dataset.word;
          const currentCategory = card.dataset.currentCategory;
          const expected = allWords.find(w => w.word === word)?.correctCategory;
          if (currentCategory) {
            const isRight = (currentCategory === expected);
            if (isRight) {
              correct++;
              card.classList.add('used-correct');
            } else {
              card.classList.add('used-incorrect');
            }
          }
        });

        // Determine if all words are placed and all are correct
        let allPlaced = true;
        for (const w of allWords) {
          const card = document.querySelector(`.wordCard[data-word="${w.word}"]`);
          if (!card || !card.dataset.currentCategory) { allPlaced = false; break; }
        }
        if (allPlaced && correct === total) {
          try {
            const btn = document.querySelector('.checkButton');
            if (btn) btn.style.display = 'none';
          } catch(e) {}
        }

        // Apply feedback directly to the words displayed inside each category box
        document.querySelectorAll('.categoryWord').forEach(span => {
          const w = (span.textContent || '').trim();
          const card = document.querySelector(`.wordCard[data-word="${w}"]`);
          if (!card) return;
          const current = card.dataset.currentCategory || '';
          const expected = allWords.find(x => x.word === w)?.correctCategory || '';
          if (current && current === expected) {
            span.classList.add('correct');
            span.classList.remove('incorrect');
          } else {
            span.classList.remove('correct');
            if (current) {
              span.classList.add('incorrect');
            } else {
              span.classList.remove('incorrect');
            }
          }
        });

        // Auto-reset word highlights after a short delay
        setTimeout(() => {
          document.querySelectorAll('.categoryWord.correct, .categoryWord.incorrect').forEach(span => {
            span.classList.remove('correct');
            span.classList.remove('incorrect');
          });
        }, 1800);

        showFeedback(correct, total);
      }

      function showFeedback(correct, total) {
        try {
          if (correct === total && total > 0) {
            // Confetti celebration
            try {
              confetti({ particleCount: 120, spread: 70, origin: { y: 0.6 } });
              setTimeout(() => confetti.reset(), 1000);
            } catch(e) {}
            // Show success notification
            if (XENITH && XENITH.FEEDBACK && XENITH.FEEDBACK.showSuccess) {
              XENITH.FEEDBACK.showSuccess({
                container: document.getElementById('x_pageDiv'),
                message: 'goed gedaan!',
                showConfetti: true,
                playSound: true
              });
            } else {
              // Fallback
              let bar = document.getElementById('categorizeFeedbackBar');
              if (!bar) {
                bar = document.createElement('div');
                bar.id = 'categorizeFeedbackBar';
                bar.style.textAlign = 'center';
                bar.style.marginTop = '10px';
                const container = document.querySelector('.categorizeContainer');
                if (container) container.appendChild(bar);
              }
              bar.innerHTML = '<div class="successMsg">goed gedaan!</div>';
            }
          } else {
            // Optionally clear message or show summary; leaving empty
          }
        } catch(e) {}
      }

      // Dropzone modal functions
      function showDropzoneModal(word) {
        const modal = document.getElementById('dropzoneModal');
        modal.style.display = 'flex';
        // Set selected word text
        try {
          const wordSpan = modal.querySelector('#selectedWordText');
          if (wordSpan) { wordSpan.textContent = word; }
        } catch(e) {}
        renderDropzoneModal();
      }

      function closeDropzoneModal() {
        const modal = document.getElementById('dropzoneModal');
        modal.style.display = 'none';
        
        // Clear selection
        if (selectedWord) {
          selectedWord.item.classList.remove('selected');
          selectedWord = null;
        }
      }

      // Close modal when clicking outside modalContent
      (function attachModalOutsideClickOnce() {
        const modal = document.getElementById('dropzoneModal');
        if (!modal || modal.__outsideClickBound) return;
        modal.addEventListener('click', function(e){
          const content = modal.querySelector('.modalContent');
          if (!content) return;
          if (!content.contains(e.target)) {
            closeDropzoneModal();
          }
        });
        modal.__outsideClickBound = true;
      })();

      // Ensure close button always works (delegated, capturing)
      (function attachCloseBtnHandlerOnce(){
        if (window.__wtCloseBtnBound) return;
        document.addEventListener('click', function(e){
          if (e.target && (e.target.classList && e.target.classList.contains('closeModal'))) {
            try { e.stopPropagation(); e.preventDefault(); } catch(e) {}
            closeDropzoneModal();
          }
        }, true);
        window.__wtCloseBtnBound = true;
      })();

      // Close modal on ESC key
      (function attachEscHandlerOnce(){
        if (window.__wtEscBound) return;
        window.addEventListener('keydown', function(e){
          if (e.key === 'Escape') {
            const modal = document.getElementById('dropzoneModal');
            if (modal && modal.style.display === 'flex') {
              closeDropzoneModal();
            }
          }
        });
        window.__wtEscBound = true;
      })();

      function renderDropzoneModal() {
        const categoriesContainer = document.querySelector('.modalCategoriesContainer');
        categoriesContainer.innerHTML = '';

        // Render simple choice buttons (like welkeZinJuist)
        categories.forEach(cat => {
          const btn = document.createElement('button');
          btn.className = 'modalOptionBtn';
          btn.innerText = cat.label;
          btn.addEventListener('click', () => {
            placeWordInCategory(cat.label);
            closeDropzoneModal();
          });
          categoriesContainer.appendChild(btn);
        });
      }
    };
    woordtrainerCategorize.init();
</script>
