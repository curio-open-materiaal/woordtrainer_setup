        this.responsiveTitle = function () {
            if (window.innerWidth >= 768 && x_fillWindow == true) {

        this.position = function () {
            const titleAlign = x_currentPageXML.getAttribute("titleVAlign");
            const $pageContents = $("#pageContents");

            $pageContents.css("margin-top", 0);

            if (x_browserInfo.mobile || $pageContents.outerHeight() > $x_pageHolder.height()) {

<script>
    // Remove any green check badges (from cache or elsewhere) – we no longer show them
    (function () {
        var ids = ['start-btn', 'l-1', 'l-2', 'l-3'];
        for (var i = 0; i < ids.length; i++) {
            var el = document.getElementById(ids[i]);
            if (el) {
                var badges = el.querySelectorAll('.badge-check');
                for (var j = 0; j < badges.length; j++) badges[j].remove();
            }
        }
    })();

    document.getElementById('start-btn').addEventListener('click', () => {
        // Navigate to the woordenlijst page
        for (var i = 0; i < x_pageInfo.length; i++) {
            var pageType = x_pageInfo[i].type ? x_pageInfo[i].type.toLowerCase() : '';
            var pageXML = x_pages[i];
            var tagName = '';
            if (pageXML && typeof pageXML.tagName !== 'undefined') {
                tagName = pageXML.tagName.toLowerCase();
            }
            
            // Find woordenLijstExtended or woordenLijstCustom page
            if (pageType === 'woordenlijstextended' || pageType === 'woordenlijst extended' || 
                pageType === 'woordenlijstcustom' || pageType === 'woordenlijst custom' ||
                tagName === 'woordenlijstextended' || tagName === 'woordenlijstcustom') {
                x_changePage(i);
                return;
            }
        }
    });

    // 'intro' button: go back to the first slide (prefer first normal page)
    (function(){
        var intro = document.getElementById('intro-btn');
        if (intro) {
            intro.addEventListener('click', function(e){
                e.preventDefault();
                try {
                    if (typeof x_changePage === 'function') {
                        if (typeof x_normalPages !== 'undefined' && x_normalPages && x_normalPages.length) {
                            x_changePage(x_normalPages[0]);
                        } else {
                            x_changePage(0);
                        }
                    } else {
                        // fallback: go to hash for first page
                        window.location.hash = '';
                    }
                } catch(err) {
                    console.warn('intro button navigation failed', err);
                }
            });
        }
    })();

    function clearCurrentLevelStats() {
        try {
            var key = 'wt:currentLevelStats:' + (location.pathname || '') + (location.search || '');
            localStorage.setItem(key, '{}');
        } catch (e) {}
    }

    // Create a reusable modal for level info (created once)
    (function() {
        const modalHtml = '\n            <div id="levelModal" class="level-modal" style="display:none; position:fixed; z-index:10000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.6); align-items:center; justify-content:center;">\n                <div class="level-modal-content" style="background:#fff; padding:1.25rem; border-radius:10px; max-width:520px; width:92%; box-shadow:0 12px 30px rgba(0,0,0,0.25);">\n                    <h3 id="levelModalTitle" style="margin-top:0;color:#7E1AE3;">Niveau</h3>\n                    <div id="levelModalBody" style="margin:0.5rem 0 1rem 0;color:#333;line-height:1.4;"></div>\n                    <div style="display:flex;justify-content:center;gap:0.5rem;">\n                        <button id="levelModalStart" style="background:#7E1AE3;color:#fff;border:none;padding:0.6rem 1.2rem;border-radius:6px;cursor:pointer;font-weight:bold;">start</button>\n                        <button id="levelModalCancel" style="background:#eee;color:#333;border:none;padding:0.6rem 1.2rem;border-radius:6px;cursor:pointer;">annuleren</button>\n                    </div>\n                </div>\n            </div>\n        ';
        document.body.insertAdjacentHTML('beforeend', modalHtml);

        const levelModal = document.getElementById('levelModal');
        const levelModalTitle = document.getElementById('levelModalTitle');
        const levelModalBody = document.getElementById('levelModalBody');
        const levelModalStart = document.getElementById('levelModalStart');
        const levelModalCancel = document.getElementById('levelModalCancel');

        // close when clicking overlay (but not when clicking content)
        levelModal.addEventListener('click', function(e) {
            if (e.target === levelModal) {
                levelModal.style.display = 'none';
            }
        });

        levelModalCancel.addEventListener('click', function() { levelModal.style.display = 'none'; });

        function navigateToLevel(level) {
            // replicate previous logic for regeneration/navigation
            if (typeof x_autoGenerateMode !== 'undefined' && x_autoGenerateMode && typeof x_virtualPages !== 'undefined' && x_virtualPages.length > 0) {
                if (typeof x_regenerateLevelExercises === 'function') {
                    x_regenerateLevelExercises(level);
                }
                clearCurrentLevelStats();

                for (var i = 0; i < x_virtualPages.length; i++) {
                    if (x_virtualPages[i].level === level && x_virtualPages[i].type !== 'levelCompletion') {
                        var baseIndex = x_pageInfo.length - x_virtualPages.length;
                        x_changePage(baseIndex + i);
                        return;
                    }
                }
            }
            window.location.hash = 'level-' + level;
        }

        // When start is clicked in modal, navigate to selected level
        let pendingLevel = 1;
        levelModalStart.addEventListener('click', function() {
            levelModal.style.display = 'none';
            navigateToLevel(pendingLevel);
        });

        // helper to show modal with content per level
        window.showLevelModal = function(level) {
            pendingLevel = level;
            const titles = {
                1: 'Level 1: herkennen en uitspreken',
                2: 'Level 2: begrijpen van de betekenis ',
                3: 'Level 3: toepassen in contextrijke situaties'
            };
            const bodies = {
                1: 'Op level 1 oefen je met het herkennen en uitspreken van woorden. Je krijgt de woorden op verschillende manieren aangeboden.',
                2: 'Op level 2 doe je opdrachten waarbij je de betekenis van woorden gaat begrijpen.',
                3: 'Op level 3 doe je opdrachten waarbij het moeilijker wordt om de juiste betekenis te kiezen. Tip: hou de woordenlijst bij de hand als je dit level gaat oefenen!'
            };
            levelModalTitle.textContent = titles[level] || ('Level ' + level);
            levelModalBody.textContent = bodies[level] || '';
            levelModal.style.display = 'flex';
            // focus start button for keyboard users
            setTimeout(() => levelModalStart.focus(), 50);
        };

        // attach click handlers to buttons to open modal
        var attachModalOpener = function(id, level) {
            var el = document.getElementById(id);
            if (el) {
                el.addEventListener('click', function(e) {
                    e.preventDefault();
                    window.showLevelModal(level);
                });
            }
        };

        attachModalOpener('l-1', 1);
        attachModalOpener('l-2', 2);
        attachModalOpener('l-3', 3);
    })();

</script>
