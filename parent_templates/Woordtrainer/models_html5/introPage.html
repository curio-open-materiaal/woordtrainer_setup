<script type="text/javascript">
var introPage = new function () {
    this.init = function () {
        const $pageContents = $("#pageContents");
        const $introText = $("#introText");
        const $woordensetText = $("#woordensetText");
        const $subsetText = $("#subsetText");

        const woordenSet = x_currentPageXML.getAttribute("woordenSet") || "";
        const woordenSetSubtitle = x_currentPageXML.getAttribute("woordenSetSubtitle") || "";
        
        // Always show "Welkom bij de woordtrainer."
        $introText.text("Welkom bij de woordtrainer.");
        
        // Get main trainer title from x_params.name (shown in header/menu before 'level 1')
        const mainTitle = (typeof x_params !== 'undefined' && x_params.name) ? x_params.name : '';
        
        // Strip HTML tags from title
        let strippedTitle = '';
        if (mainTitle) {
            const div = $("<div>").html(mainTitle);
            strippedTitle = div.text() || div.textContent || '';
        }
        
        // Use main title for wordenset text if available, otherwise use woordenSet attribute
        if (strippedTitle && strippedTitle.trim() !== '') {
            $woordensetText.html('<b>' + strippedTitle.trim() + '</b>');
        } else if (woordenSet) {
            $woordensetText.html('<b>' + woordenSet + '</b>');
        }
        
        if (woordenSetSubtitle) {
            $subsetText.html("subset: <b>" + woordenSetSubtitle + "</b>");
        }

        // Language selector - load saved language
        var savedLang = localStorage.getItem('woordenlijst_selected_language') || '';
        if (savedLang) {
            $("#languageSelector").val(savedLang);
        }
        
        // Language selector change handler
        $("#languageSelector").change(function() {
            var lang = $(this).val();
            if (lang === '') {
                localStorage.removeItem('woordenlijst_selected_language');
            } else {
                localStorage.setItem('woordenlijst_selected_language', lang);
            }
        });

        // Start button action
        $("#startBtn").click(function () {
            // First check if there's a title page (level selection) - navigate there if it exists
            var titlePageIndex = -1;
            for (var i = 0; i < x_pageInfo.length; i++) {
                var pageType = x_pageInfo[i] ? x_pageInfo[i].type : '';
                var pageXML = x_pages[i];
                var tagName = '';
                if (pageXML && typeof pageXML.tagName !== 'undefined') {
                    tagName = pageXML.tagName.toLowerCase();
                }
                if (pageType === 'title' || tagName === 'title') {
                    titlePageIndex = i;
                    break;
                }
            }
            
            // If title page exists, navigate there
            if (titlePageIndex >= 0) {
                x_changePage(titlePageIndex);
                return;
            }
            
            // Otherwise, navigate to next page normally
            const currentIndex = $.inArray(x_currentPage, x_normalPages);
            if (currentIndex !== -1 && currentIndex < x_normalPages.length - 1) {
                x_changePage(x_normalPages[currentIndex + 1]);
            }
        });

        this.position();
        
        // Display UON number if available
        // Note: in some editor/preview contexts rloObject wrapper may not have run yet,
        // so `x_uonNumber` might be undefined (avoid ReferenceError).
        if (typeof x_uonNumber !== 'undefined' && x_uonNumber && x_uonNumber.trim() !== '') {
            const uonDisplay = document.getElementById('uon-number-display');
            if (uonDisplay) {
                uonDisplay.textContent = 'UON: ' + x_uonNumber;
                uonDisplay.style.display = 'block';
            }
        }
        
        x_pageLoaded();
    };

    this.position = function () {
        const $pageContents = $("#pageContents");
        $pageContents.css("margin-top", 0);

        if (x_browserInfo.mobile || $pageContents.outerHeight() > $x_pageHolder.height()) {
            $pageContents.css("position", "inherit");
            $pageContents.attr('data-position-set-by-page', 'false');
        } else {
            $pageContents.css("position", "absolute");
            $pageContents.css({
                "top": "50%",
                "left": "50%",
                "transform": "translate(-50%, -50%)"
            });
            $pageContents.attr('data-position-set-by-page', 'true');
        }
    };
};

introPage.init();

</script>
