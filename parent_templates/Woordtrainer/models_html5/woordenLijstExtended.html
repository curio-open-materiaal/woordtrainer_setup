    var woordenLijstExtended = new function () {
        const SHOW_WORD_PROGRESS = true;
        
        // Build practice summary from localStorage
        // Strip HTML tags from text
        const stripHtml = function(html) {
            if (!html) return '';
            const tmp = document.createElement('DIV');
            tmp.innerHTML = html;
            return tmp.textContent || tmp.innerText || '';
        };

        // Language flags mapping
        const languageFlags = {
            'en': '🇬🇧',

            'es': '🇪🇸',

        // Available languages for translation (25 languages total)
        const availableLanguages = [
            { code: 'en', name: 'English' },
            { code: 'fr', name: 'Français' },
            { code: 'es', name: 'Español' },
            { code: 'de', name: 'Deutsch' },

            { code: 'el', name: 'Ελληνικά' },

            { code: 'uk', name: 'Українська' },
            { code: 'ti', name: 'ትግርኛ' }
        ];

        // Selected language (stored in localStorage)
        let selectedLanguage = localStorage.getItem('woordenlijst_selected_language') || '';

        // Translate text using MyMemory Translation API (free, no API key needed)
        const translateText = async function(text, targetLang) {
            if (!text || text.trim() === '') return '';
            
            try {
                // Source language is Dutch (nl), target is the requested language
                const sourceLang = 'nl';
                const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${sourceLang}|${targetLang}&de=f.vangils@curio.nl`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.responseStatus === 200 && data.responseData && data.responseData.translatedText) {
                    let t = data.responseData.translatedText;
                    if (/MYMEMORY WARNING|USED ALL AVAILABLE FREE|NEXT AVAILABLE IN/i.test(t)) t = 'Vertaling niet beschikbaar';
                    return t;
                }
                return '';
            } catch (error) {
                console.error('Translation error:', error);
                return '';
            }
        };

        // Show translations for a meaning (only for selected language)
        const showTranslations = async function(text, container) {
            // Always get the latest selected language from localStorage
            var currentSelectedLanguage = localStorage.getItem('woordenlijst_selected_language') || '';
            
            // Only show translations if a language is selected
            if (!currentSelectedLanguage || currentSelectedLanguage.trim() === '') return;
            
            // Get the selected language
            const lang = availableLanguages.find(function(l) { return l.code === currentSelectedLanguage; });
            if (!lang) return;

            const translationsDiv = document.createElement('div');
            translationsDiv.style.cssText = 'margin-top: 0.75rem; color: #666; font-size: 0.95rem; font-style: italic;';
            translationsDiv.innerHTML = '<span style="color: #999; font-style: normal;">Laden...</span>';
            container.appendChild(translationsDiv);

            // Fetch translation for the selected language
            const translation = await translateText(text, lang.code);
            
            // Show result without card
            if (translation && translation.trim() !== '' && translation.toLowerCase() !== text.toLowerCase()) {
                const flag = languageFlags[lang.code] || '🌐';

                translationsDiv.innerHTML = flag + ' <span style="color: #666; font-size: 0.9em;">' + langName + ':</span> <span style="color: #333; font-weight: 500;">' + translationText + '</span>';

                translationsDiv.remove();

        const buildPracticeSummary = function() {
            try {
                const map = {};
                
                // First, get global word stats (not per course)
                if (typeof window.wtGetGlobalWordStats === 'function') {
                    // Get all global stats
                    try {
                        const globalStats = JSON.parse(localStorage.getItem('wt:globalWordStats') || '{}');
                        Object.keys(globalStats).forEach(wordKey => {
                            const stats = globalStats[wordKey];
                            if (stats && (stats.right > 0 || stats.wrong > 0)) {
                                map[wordKey] = {
                                    right: Number(stats.right || 0),
                                    wrong: Number(stats.wrong || 0)
                                };
                            }
                        });
                    } catch(e) {}
                }
                
                // Also get course-specific stats from wt:stats (for backward compatibility)
                // Only for words not already in global stats, to avoid double counting
                const prefix = `wt:stats:${location.pathname}${location.search || ''}`;
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (!key || !key.startsWith(prefix)) continue;
                    let entry = {};
                    try { entry = JSON.parse(localStorage.getItem(key) || '{}'); } catch(e) {}
                    const w = (entry && entry.word) ? String(entry.word).trim().toLowerCase() : null;
                    if (!w || map[w]) continue;
                    const right = Number(entry.rightCount || 0);
                    const wrong = Number(entry.wrongCount || (Array.isArray(entry.wrong) ? entry.wrong.length : 0));
                    map[w] = { right: isNaN(right) ? 0 : right, wrong: isNaN(wrong) ? 0 : wrong };
                }
                return map;
            } catch (e) { return {}; }
        };
        
        // Apply progress colors to word elements
        const applyProgressToElement = function(p, practiceSummary) {
            const key = p.dataset.word ? p.dataset.word.trim().toLowerCase() : p.textContent.trim().toLowerCase();
            const stats = practiceSummary[key];
            p.style.backgroundImage = '';
            p.style.backgroundColor = '';
            p.style.boxShadow = '';
            p.removeAttribute('title');
            
            if (stats) {
                const total = stats.right + stats.wrong;
                if (total >= 4) {
                    const controlled = (stats.right >= 4 * Math.max(1, stats.wrong));
                    const weak = (stats.wrong > stats.right);
                    if (controlled) {
                        p.style.backgroundColor = '#c8f7c5';
                        p.style.boxShadow = 'inset 0 0 0 2px #28a74533';
                    } else if (weak) {
                        p.style.backgroundColor = '#f8d7da';
                        p.style.boxShadow = 'inset 0 0 0 2px #dc354533';
                    } else {
                        p.style.backgroundColor = '#ffe5b4';
                        p.style.boxShadow = 'inset 0 0 0 2px #ff980033';
                    }
                    p.style.transition = 'background 0.3s ease';
                }
            }
        };

        this.init = function () {
            // Reset scroll position to top
            window.scrollTo(0, 0);
            if (document.documentElement) document.documentElement.scrollTop = 0;
            if (document.body) document.body.scrollTop = 0;

            // On this woordenlijst page, redirect the global "verder" button to the level-select (title) page if present.
            (function attachNextToTitle() {
                try {
                    if (typeof x_pageInfo === 'undefined' || typeof x_changePage !== 'function') {
                        return;
                    }
                    var titleIndex = -1;
                    for (var i = 0; i < x_pageInfo.length; i++) {
                        var pt = x_pageInfo[i] && x_pageInfo[i].type ? x_pageInfo[i].type.toLowerCase() : '';
                        var xml = x_pages[i];
                        var tag = xml && xml.tagName ? xml.tagName.toLowerCase() : '';
                        if (pt === 'title' || tag === 'title') {
                            titleIndex = i;
                            break;
                        }
                    }
                    if (titleIndex < 0) {
                        return;
                    }
                    if (typeof $ !== 'undefined') {
                        $('#x_nextBtn, #x_nextBtn_top').off('.wtWordsNext').on('click.wtWordsNext', function (e) {
                            try {
                                // Only override "next" while we're on the actual words list page.
                                // Otherwise, exercise pages would also be redirected to the title/level selection.
                                var absolutePageIndex = -1;
                                if (typeof x_normalPages !== 'undefined' && x_normalPages && x_normalPages.length) {
                                    var currentIndexInNormalPages = $.inArray(x_currentPage, x_normalPages);
                                    if (currentIndexInNormalPages !== -1) {
                                        absolutePageIndex = x_normalPages[currentIndexInNormalPages];
                                    }
                                }

                                var currentType = '';
                                if (absolutePageIndex >= 0 && x_pageInfo && x_pageInfo[absolutePageIndex]) {
                                    currentType = (x_pageInfo[absolutePageIndex].type || '').toLowerCase();
                                }

                                var currentTag = '';
                                if (typeof x_currentPageXML !== 'undefined' && x_currentPageXML && typeof x_currentPageXML.tagName !== 'undefined') {
                                    currentTag = (x_currentPageXML.tagName || '').toLowerCase();
                                }

                                var isWordsList = (currentType === 'woordenlijstextended' || currentType === 'woordenlijst extended' ||
                                    currentType === 'woordenlijstcustom' || currentType === 'woordenlijst custom' ||
                                    currentTag === 'woordenlijstextended' || currentTag === 'woordenlijstcustom');

                                if (!isWordsList) return; // Let the normal Xerte next navigation handle it

                                e.preventDefault();
                                e.stopImmediatePropagation();
                                x_changePage(titleIndex);
                            } catch (err) {}
                        });
                    }
                } catch (e) {}
            })();
            
            Promise.resolve().then(() => {
                // Get selected language from localStorage
                selectedLanguage = localStorage.getItem('woordenlijst_selected_language') || '';
                
                const words = [];
                
                // Get the wordListText attribute from XML
                const wordListText = x_currentPageXML.getAttribute('wordListText') || '';
                
                if (!wordListText || wordListText.trim() === '') {
                    document.getElementById('amount-words').textContent = '0';
                    const container = document.getElementById('wordListContainer');
                    const existingMessage = container.querySelector('p');
                    if (!existingMessage) {
                        const message = document.createElement('p');
                        message.innerHTML = "<em>Geen woorden beschikbaar.</em>";
                        container.appendChild(message);
                    }
                    addPrintButton([]);
                    x_pageLoaded();
                    return;
                }
                
                // Parse the text format
                // First, try splitting by double newlines (empty lines) to separate words
                let wordBlocks = wordListText.split(/\n\s*\n/);
                
                // If no double newlines found, try to detect word blocks by pattern
                if (wordBlocks.length === 1) {
                    const allLines = wordListText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
                    wordBlocks = [];
                    let currentBlock = [];
                    
                    allLines.forEach((line, index) => {
                        // Check if this line starts a new word (has pattern "word:meaning" and doesn't start with "contextzin")
                        const wordMatch = line.match(/^([^:]+):(.+)$/);
                        const isNewWord = wordMatch && !line.toLowerCase().startsWith('contextzin');
                        
                        if (isNewWord && currentBlock.length > 0) {
                            // Save previous block and start new one
                            wordBlocks.push(currentBlock.join('\n'));
                            currentBlock = [line];
                        } else {
                            currentBlock.push(line);
                        }
                    });
                    
                    if (currentBlock.length > 0) {
                        wordBlocks.push(currentBlock.join('\n'));
                    }
                }
                
                wordBlocks.forEach(block => {
                    const lines = block.split('\n').map(l => l.trim()).filter(l => l.length > 0);
                    if (lines.length === 0) return;
                    
                    let word = '';
                    let betekenis = '';
                    let contextzinImpliciet = '';
                    let contextzinExpliciet = '';
                    
                    lines.forEach(line => {
                        // Check for "woord:betekenis" format (word and meaning on same line)
                        const wordMatch = line.match(/^([^:]+):(.+)$/);
                        if (wordMatch && !line.toLowerCase().startsWith('contextzin')) {
                            word = wordMatch[1].trim();
                            betekenis = wordMatch[2].trim();
                        }
                        // Check for "contextzin (i):" format
                        else if (line.toLowerCase().startsWith('contextzin (i):')) {
                            contextzinImpliciet = line.substring(15).trim();
                        }
                        // Check for "contextzin (e):" format
                        else if (line.toLowerCase().startsWith('contextzin (e):')) {
                            contextzinExpliciet = line.substring(15).trim();
                        }
                    });
                    
                    if (word) {
                        words.push({
                            word: stripHtml(word),
                            betekenis: stripHtml(betekenis),
                            contextzinExpliciet: stripHtml(contextzinExpliciet),
                            contextzinImpliciet: stripHtml(contextzinImpliciet),
                            audioWoord: '',
                            audioBetekenis: '',
                            audioContextExpliciet: '',
                            audioContextImpliciet: ''
                        });
                    }
                });

                document.getElementById('amount-words').textContent = words.length;

                const container = document.getElementById('wordListContainer');
                
                // Remove existing word list and message; keep static .woordenlijst-actions
                const existingWordList = container.querySelector('.wordList');
                if (existingWordList) existingWordList.remove();
                const existingMessage = container.querySelector('#wordListContainer > p');
                if (existingMessage) existingMessage.remove();
                const existingTip = container.querySelector('.print-tip');
                if (existingTip) existingTip.remove();

                if (words.length === 0) {
                    const message = document.createElement('p');
                    message.innerHTML = "<em>Geen woorden beschikbaar.</em>";
                    container.appendChild(message);
                    addPrintButton([]);
                    x_pageLoaded();
                    return;
                }

                const div = document.createElement('div');
                div.className = 'wordList';
                
                if (words.length >= 13) {
                    div.classList.add('compact');
                }

                function updateProgressBackgrounds() {
                    if (!SHOW_WORD_PROGRESS) return;
                    const summary = buildPracticeSummary();
                    document.querySelectorAll('.wordList p').forEach(p => applyProgressToElement(p, summary));
                }

                words.forEach(wordData => {
                    const p = document.createElement('p');
                    p.textContent = stripHtml(wordData.word);
                    p.dataset.word = stripHtml(wordData.word);
                    
                    const isSentence = wordData.word.indexOf(' ') !== -1;
                    if (!isSentence) {
                        p.style.textTransform = 'lowercase';
                    } else {
                        p.style.textTransform = 'none';
                    }

                    p.addEventListener('click', () => {
                        showWordModal(wordData);
                        
                        // Pulse effect
                        p.classList.remove('clicked');
                        void p.offsetWidth;
                        p.classList.add('clicked');
                    });

                    div.appendChild(p);
                });

                window.addEventListener('focus', updateProgressBackgrounds, { passive: true });
                document.addEventListener('visibilitychange', function() {
                    if (document.visibilityState === 'visible') updateProgressBackgrounds();
                }, { passive: true });
                window.addEventListener('wt:statsUpdated', updateProgressBackgrounds, { passive: true });

                // Insert word list before the static .woordenlijst-actions
                const actionsEl = container.querySelector('.woordenlijst-actions');
                if (actionsEl) {
                    container.insertBefore(div, actionsEl);
                } else {
                    container.appendChild(div);
                }
                
                addPrintButton(words);
                
                for (let i = 0; i < 4; i++) {
                    setTimeout(() => updateProgressBackgrounds(), 50 + i * 1000);
                }
                
                x_pageLoaded();
            });
        };

        function escapeHtmlProgress(text) {
            if (!text) return '';
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function openProgressModalWoordenlijst(words) {
            var wordSet = {};
            for (var i = 0; i < words.length; i++) {
                var w = words[i];
                var wordStr = (w && w.word != null) ? String(w.word).trim() : '';
                var k = wordStr.toLowerCase();
                if (k && !wordSet[k]) wordSet[k] = wordStr;
            }
            var globalStatsData = {};
            try {
                globalStatsData = JSON.parse(localStorage.getItem('wt:globalWordStats') || '{}');
            } catch (e) {}
            var byWordAll = {};
            for (var gk in globalStatsData) {
                if (globalStatsData.hasOwnProperty(gk)) {
                    var g = globalStatsData[gk];
                    byWordAll[gk] = {
                        word: wordSet[gk] || gk,
                        right: (g && typeof g.right === 'number') ? g.right : 0,
                        wrong: (g && typeof g.wrong === 'number') ? g.wrong : 0
                    };
                }
            }
            for (var k in wordSet) {
                if (wordSet.hasOwnProperty(k) && !byWordAll[k]) {
                    byWordAll[k] = { word: wordSet[k], right: 0, wrong: 0 };
                } else if (byWordAll[k] && wordSet[k]) {
                    byWordAll[k].word = wordSet[k];
                }
            }
            var wordsForTable = [];
            for (var k in wordSet) {
                if (wordSet.hasOwnProperty(k)) {
                    wordsForTable.push({
                        word: wordSet[k],
                        allRight: (byWordAll[k] && byWordAll[k].right) || 0,
                        allWrong: (byWordAll[k] && byWordAll[k].wrong) || 0
                    });
                }
            }
            if (wordsForTable.length === 0) {
                for (var k in byWordAll) {
                    if (byWordAll.hasOwnProperty(k)) {
                        wordsForTable.push({
                            word: byWordAll[k].word,
                            allRight: byWordAll[k].right || 0,
                            allWrong: byWordAll[k].wrong || 0
                        });
                    }
                }
            }
            wordsForTable.sort(function(a, b) { return a.word.localeCompare(b.word, 'nl'); });
            
            function renderTable() {
                var h = '<div class="progress-table-wrap"><table class="progress-table">' +
                    '<thead><tr><th>woord</th><th>goed</th><th>fout</th><th>totaal</th><th>%</th></tr></thead><tbody>';
                for (var i = 0; i < wordsForTable.length; i++) {
                    var w = wordsForTable[i];
                    var right = w.allRight || 0;
                    var wrong = w.allWrong || 0;
                    var total = right + wrong;
                    var pct = total > 0 ? Math.round((right / total) * 100) : '-';
                    h += '<tr><td class="progress-word">' + escapeHtmlProgress(w.word) + '</td>' +
                        '<td class="progress-good">' + right + '</td>' +
                        '<td class="progress-wrong">' + wrong + '</td>' +
                        '<td>' + total + '</td>' +
                        '<td class="progress-pct">' + pct + (total > 0 ? '%' : '') + '</td></tr>';
                }
                h += '</tbody></table></div>';
                return h;
            }
            
            var modal = document.getElementById('progressModalWoordenlijst');
            var content = document.getElementById('progressModalContentWoordenlijst');
            if (!modal || !content) return;
            var html = '<h3 class="progress-modal-title">Voortgang per woord (algemeen)</h3>';
            if (wordsForTable.length === 0) {
                html += '<p class="progress-row">Geen voortgang nog. Maak oefeningen om je resultaten te zien.</p>';
            } else {
                html += renderTable();
            }
            content.innerHTML = html;
            modal.style.display = 'flex';
        }
        
        window.wtCloseProgressModal = function() {
            var m = document.getElementById('progressModalWoordenlijst');
            if (m) m.style.display = 'none';
        };

        function addPrintButton(words) {
            const container = document.getElementById('wordListContainer');
            
            // Check if there's any progress data to reset
            let hasProgressData = false;
            try {
                const pathQuery = (location.pathname || '') + (location.search || '');
                const statsPrefix = `wt:stats:${pathQuery}`;
                const donePrefix = `wt:done:${pathQuery}`;
                const currentLevelPrefix = `wt:currentLevelStats:${pathQuery}`;
                const progressKey = 'xerte_progress_' + (typeof x_TemplateId !== 'undefined' ? x_TemplateId : 'default');
                if (localStorage.getItem('wt:globalWordStats')) hasProgressData = true;
                if (localStorage.getItem(currentLevelPrefix)) hasProgressData = true;
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key && (key.startsWith(statsPrefix) || key.startsWith(donePrefix) || key === progressKey)) {
                        hasProgressData = true;
                        break;
                    }
                }
            } catch(e) {}
            
            // Only show reset button if there's data
            if (hasProgressData) {
                const resetBtn = document.createElement('button');
                resetBtn.id = 'resetProgressBtn';
                resetBtn.innerHTML = '<i class="fa fa-rotate-left"></i>';
                resetBtn.title = 'Reset voortgang';
                resetBtn.style.cssText = 'position:absolute;top:10px;right:10px;width:36px;height:36px;padding:0;background-color:#dc3545;color:white;border:none;border-radius:50%;cursor:pointer;transition:background-color 0.3s ease;display:flex;align-items:center;justify-content:center;font-size:16px;z-index:10;';
                resetBtn.addEventListener('click', () => {
                    if (confirm('Weet je het zeker? Alle voortgang wordt gewist.')) {
                        try {
                            const pathQuery = (location.pathname || '') + (location.search || '');
                            const statsPrefix = `wt:stats:${pathQuery}`;
                            const donePrefix = `wt:done:${pathQuery}`;
                            const currentLevelPrefix = `wt:currentLevelStats:${pathQuery}`;
                            const progressKey = 'xerte_progress_' + (typeof x_TemplateId !== 'undefined' ? x_TemplateId : 'default');
                            const keysToRemove = [];
                            if (localStorage.getItem('wt:globalWordStats')) keysToRemove.push('wt:globalWordStats');
                            if (localStorage.getItem(currentLevelPrefix)) keysToRemove.push(currentLevelPrefix);
                            for (let i = 0; i < localStorage.length; i++) {
                                const key = localStorage.key(i);
                                if (key && (key.startsWith(statsPrefix) || key.startsWith(donePrefix) || key === progressKey)) {
                                    keysToRemove.push(key);
                                }
                            }
                            keysToRemove.forEach(k => localStorage.removeItem(k));
                            // Refresh display and hide button
                            const summary = buildPracticeSummary();
                            document.querySelectorAll('.wordList p').forEach(p => applyProgressToElement(p, summary));
                            resetBtn.remove();
                            location.reload();
                        } catch(e) {}
                    }
                });
                resetBtn.addEventListener('mouseenter', () => resetBtn.style.backgroundColor = '#c82333');
                resetBtn.addEventListener('mouseleave', () => resetBtn.style.backgroundColor = '#dc3545');
                
                container.style.position = 'relative';
                container.appendChild(resetBtn);
            }
            
            const actionsDiv = container.querySelector('.woordenlijst-actions');
            const printBtn = document.getElementById('printWordsBtn');
            const progressBtn = document.getElementById('progressWordsBtn');
            if (actionsDiv && printBtn && progressBtn) {
                printBtn.onclick = () => printWordsList(words);
                progressBtn.onclick = () => openProgressModalWoordenlijst(words);
            } else {
                const wrap = document.createElement('div');
                wrap.className = 'woordenlijst-actions';
                const progBtn = document.createElement('button');
                progBtn.type = 'button';
                progBtn.id = 'progressWordsBtn';
                progBtn.className = 'progress-button';
                progBtn.innerHTML = '<i class="fa fa-chart-bar" aria-hidden="true"></i> bekijk voortgang';
                progBtn.addEventListener('click', () => openProgressModalWoordenlijst(words));
                const pBtn = document.createElement('button');
                pBtn.type = 'button';
                pBtn.id = 'printWordsBtn';
                pBtn.className = 'print-button';
                pBtn.innerHTML = '<i class="fa fa-print" aria-hidden="true"></i> print woordenlijst';
                pBtn.addEventListener('click', () => printWordsList(words));
                wrap.appendChild(progBtn);
                wrap.appendChild(pBtn);
                container.appendChild(wrap);
            }
            
            // Add tip with translation
            const tipDiv = document.createElement('div');
            tipDiv.className = 'print-tip';
            const tipText = 'tip: print de woordenlijst uit zodat je aantekeningen kan maken en de woorden altijd bij de hand hebt!';
            tipDiv.textContent = tipText;
            
            container.appendChild(tipDiv);
            
            // Add translation for tip
            if (typeof x_addTranslationUnder === 'function') {
                setTimeout(function() {
                    x_addTranslationUnder(tipDiv, tipText);
                }, 100);
            }
        }

        function printWordsList(words) {
            // Create print window
            const printWindow = window.open('', '_blank');
            
            // Get project title for the print
            const projectTitle = document.querySelector('h1') ? document.querySelector('h1').textContent : 'Woordtrainer';
            
            // Extract just the words for printing
            const wordList = words.map(w => w.word);
            
            printWindow.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Woordenlijst - ${projectTitle}</title>
                    <style>
                        body {
                            font-family: Arial, sans-serif;
                            margin: 0;
                            padding: 40px 30px 20px 30px;
                            color: #333;
                            box-sizing: border-box;
                        }
                        * {
                            box-sizing: border-box;
                        }
                        .print-header {
                            text-align: center;
                            margin-bottom: 30px;
                            border-bottom: 2px solid #7E1AE3;
                            padding-bottom: 20px;
                        }
                        .print-header h1 {
                            color: #7E1AE3;
                            margin: 0 0 10px 0;
                            font-size: 24px;
                        }
                        .print-header p {
                            margin: 0;
                            color: #666;
                            font-size: 14px;
                        }
                        .words-table {
                            width: 100%;
                            max-width: 100%;
                            border-collapse: collapse;
                            margin-bottom: 40px;
                            box-sizing: border-box;
                        }
                        .words-table th {
                            background-color: #7E1AE3;
                            color: white;
                            padding: 12px;
                            text-align: left;
                            font-weight: bold;
                        }
                        .words-table td {
                            border: 1px solid #ddd;
                            border-right: 1px solid #ddd;
                            padding: 12px;
                            vertical-align: top;
                        }
                        .words-table tr:nth-child(even) {
                            background-color: #f9f9f9;
                        }
                        .number-cell {
                            font-weight: bold;
                            font-size: 16px;
                            width: 10%;
                            text-align: center;
                            background-color: #f0e6ff;
                        }
                        .word-cell {
                            font-weight: bold;
                            font-size: 16px;
                            width: 30%;
                        }
                        .notes-cell {
                            width: 60%;
                            min-height: 40px;
                        }
                        .print-footer {
                            text-align: center;
                            margin-top: 40px;
                            padding-top: 20px;
                            border-top: 2px solid #7E1AE3;
                        }
                        .print-footer p {
                            margin: 10px 0;
                            color: #7E1AE3;
                            font-weight: bold;
                        }
                        .logos {
                            position: fixed;
                            bottom: 20px;
                            left: 50%;
                            transform: translateX(-50%);
                            display: flex;
                            justify-content: center;
                            align-items: center;
                            gap: 15px;
                            z-index: 1000;
                        }
                        .logo {
                            height: 25px;
                            width: auto;
                        }
                        @media print {
                            body { 
                                margin: 0 !important; 
                                padding: 40px 30px 20px 30px !important;
                            }
                            .print-header, .print-footer { page-break-inside: avoid; }
                            .logos {
                                position: fixed !important;
                                bottom: 20px !important;
                                left: 50% !important;
                                transform: translateX(-50%) !important;
                            }
                            @page {
                                margin: 0;
                                size: A4;
                            }
                        }
                    </style>
                </head>
                <body>
                    <div class="print-header">
                        <h1>woordenlijst</h1>
                        <p>${projectTitle}</p>
                    </div>
                    
                    <table class="words-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>woord</th>
                                <th>aantekeningen</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${wordList.map((word, index) => `
                                <tr>
                                    <td class="number-cell">${index + 1}</td>
                                    <td class="word-cell">${word}</td>
                                    <td class="notes-cell"></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    
                    
                </body>
                </html>
            `);
            
            printWindow.document.close();
            
            // Wait for content to load then print
            printWindow.onload = function() {
                setTimeout(() => {
                    printWindow.print();
                    printWindow.close();
                }, 500);
            };
        }
    };

    function showProgressModal(word, stats, colorType, hasEnoughData) {
        const modal = document.createElement('div');
        modal.className = 'word-modal';
        modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:10000;display:flex;align-items:center;justify-content:center;';
        
        const content = document.createElement('div');
        content.style.cssText = 'background:#fff;border-radius:12px;padding:1.5rem;max-width:400px;width:90%;box-shadow:0 10px 30px rgba(0,0,0,0.3);';
        
        const close = document.createElement('button');
        close.innerHTML = '&times;';
        close.style.cssText = 'position:absolute;top:8px;right:8px;background:none;border:none;font-size:1.5rem;cursor:pointer;color:#666;';
        close.addEventListener('click', () => modal.remove());
        
        const title = document.createElement('h3');
        title.textContent = `Voortgang: ${word}`;
        title.style.cssText = 'margin:0 0 1rem 0;text-align:center;color:#333;';
        
        let message = '';
        if (!hasEnoughData) {
            message = 'Doe meer opdrachten met dit woord om een score te krijgen.';
        } else if (colorType === 'controlled') {
            message = 'Je beheerst dit woord al goed!';
        } else if (colorType === 'learning') {
            message = 'Nog een paar oefeningen met dit woord en je beheerst het!';
        } else {
            message = 'Dit woord moet je nog even goed oefenen!';
        }
        
        const messageDiv = document.createElement('div');
        messageDiv.style.cssText = 'background:#f9f9f9;border-radius:8px;padding:1rem;margin-bottom:1rem;font-size:1rem;text-align:center;font-weight:500;color:#333;';
        messageDiv.textContent = message;
        
        content.style.position = 'relative';
        content.appendChild(close);
        content.appendChild(title);
        content.appendChild(messageDiv);
        
        if (stats && (stats.right > 0 || stats.wrong > 0)) {
            const statsDiv = document.createElement('div');
            statsDiv.style.cssText = 'background:#f9f9f9;border-radius:8px;padding:1rem;margin-top:0;';
            statsDiv.innerHTML = `
                <p style="margin:0.25rem 0;"><strong>Totaal geoefend:</strong> ${stats.right + stats.wrong}×</p>
                <p style="margin:0.25rem 0;"><strong>Goed:</strong> ${stats.right}</p>
                <p style="margin:0.25rem 0;"><strong>Fout:</strong> ${stats.wrong}</p>
            `;
            content.appendChild(statsDiv);
        }
        
        modal.appendChild(content);
        document.body.appendChild(modal);
        
        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.remove();
        });
    }

    woordenLijstExtended.init();
    
    // Add translation for subtitle after page loads
    if (typeof x_addTranslationUnder === 'function') {
        setTimeout(function() {
            const subtitleEl = document.querySelector('.subtitle');
            if (subtitleEl) {
                const subtitleText = 'Klik op de woorden voor meer informatie';
                x_addTranslationUnder(subtitleEl, subtitleText);
            }
        }, 100);
    }
</script>

<div id="pageContents">
    <div id="wtWordListSection" class="wt-wordlist-section">
        <div class="titles">
            <h3>Jouw <span id="amount-words"></span> nieuwe woorden.</h3>
            <div class="subtitle">Klik op de woorden voor meer informatie.</div>
        </div>
        <div id="wordListContainer">
            <div class="woordenlijst-actions">
                <button type="button" id="progressWordsBtn" class="progress-button"><i class="fa fa-chart-bar" aria-hidden="true"></i> bekijk voortgang</button>
                <button type="button" id="printWordsBtn" class="print-button"><i class="fa fa-print" aria-hidden="true"></i> print woordenlijst</button>
            </div>
        </div>
    </div>
</div>

    <div class="progress-modal-overlay" onclick="window.wtCloseProgressModal();"></div>
    <div class="progress-modal-box">
        <button type="button" class="progress-modal-close" onclick="window.wtCloseProgressModal();" aria-label="Sluiten">&times;</button>
        <div id="progressModalContentWoordenlijst"></div>
    </div>
</div>
