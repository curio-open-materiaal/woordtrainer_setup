<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script type="text/javascript">
  var woordtrainerQuiz = new function () {
    this.init = function () {
      document.getElementById('x_pageDiv').firstChild.style.visibility = 'visible';

      const wrapper = document.getElementById('quizWrapper');
      if (!wrapper) return;

      const intro = 'Welk woord hoort hier?';
      const introTextEl = wrapper.querySelector('.introText');
      introTextEl.innerHTML = intro;
      
      // Add translation under intro text
      if (typeof x_addTranslationUnder === 'function') {
        x_addTranslationUnder(introTextEl, intro);
      }

      const vraag = x_currentPageXML.getAttribute('woordItemText') || '';
      const opties = (x_currentPageXML.getAttribute('woordItemOptions') || '').split('|');
      const correct = x_currentPageXML.getAttribute('woordItemCorrect') || '';
      const image = x_currentPageXML.getAttribute('img') || '';
      const imageHtml = x_currentPageXML.getAttribute('woordItemImageHtml') || '';

      if (opties.length < 2 || !correct || (!image && !imageHtml)) {
        wrapper.querySelector('.quizContainer').innerHTML = '<p style="color:red;">Onvolledige quizgegevens. Voeg een afbeelding of tekst toe.</p>';
        return;
      }

      // Ensure feedback bar exists (fixed full-width bar that slides up from below)
      if (!document.getElementById('quizFeedbackBar')) {
        const fb = document.createElement('div');
        fb.id = 'quizFeedbackBar';
        fb.className = 'feedbackBar';
        fb.innerHTML = '<div class="feedbackInner"></div>';
        document.body.appendChild(fb);
      }

      // Helper to show the fixed feedback bar
      function showFeedback(message, type, duration) {
        try {
          const bar = document.getElementById('quizFeedbackBar');
          if (!bar) return;
          const inner = bar.querySelector('.feedbackInner');
          inner.textContent = message;
          bar.classList.remove('success', 'error');
          bar.classList.add(type === 'success' ? 'success' : 'error');
          // trigger animation (slide up)
          requestAnimationFrame(() => bar.classList.add('show'));
          if (duration && duration > 0) {
            clearTimeout(bar._hideTimeout);
            bar._hideTimeout = setTimeout(() => {
              bar.classList.remove('show');
            }, duration);
          }
        } catch (e) {}
      }

      renderQuestion(vraag, opties, correct, image, imageHtml);
    };

    function playSuccess() {
      try {
        // Create a simple success sound using Web Audio API
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
        oscillator.frequency.setValueAtTime(1000, audioContext.currentTime + 0.1);
        oscillator.frequency.setValueAtTime(1200, audioContext.currentTime + 0.2);
        
        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
        
        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.3);
      } catch (e) {
      }
    }

    function playError() {
      try {
        // Create a simple error sound using Web Audio API
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        oscillator.frequency.setValueAtTime(300, audioContext.currentTime);
        oscillator.frequency.setValueAtTime(200, audioContext.currentTime + 0.1);
        
        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
        
        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.2);
      } catch (e) {
      }
    }

    function launchConfetti() {
      confetti({
        particleCount: 100,
        spread: 70,
        origin: { y: 0.6 }
      });
      setTimeout(() => confetti.reset(), 1000);
    }

    function renderQuestion(vraag, opties, correct, image, imageHtml) {
      const container = document.querySelector('.quizContainer');
      container.innerHTML = '';

      // Only show quizQuestion if vraag is different from introText or not empty
      // Since introText already shows "Welk woord hoort hier?", we don't need to show it again
      const layout = document.createElement('div');
      layout.className = 'quizLayout';

      const left = document.createElement('div');
      left.className = 'quizImage';
      
      // Add class based on what content is present
      if (image && imageHtml) {
        left.classList.add('hasBoth');
      } else if (image) {
        left.classList.add('hasImage');
      } else if (imageHtml) {
        left.classList.add('hasText');
      }
      
      // Handle image
      if (image) {
        const img = document.createElement('img');
        img.src = image;
        img.alt = 'Quizafbeelding';
        left.appendChild(img);
      }
      
      // Handle HTML/text content
      if (imageHtml) {
        const htmlContent = document.createElement('div');
        htmlContent.className = 'quizTextContent';
        htmlContent.innerHTML = imageHtml;
        left.appendChild(htmlContent);
      }

      const right = document.createElement('div');
      right.className = 'quizOptions';

      const optionsGrid = document.createElement('div');
      optionsGrid.className = 'optionsGrid';

      const successMsg = document.createElement('div');
      successMsg.className = 'successMsg';
      successMsg.textContent = 'dit is correct!';
      successMsg.style.display = 'none';

      // Randomize the order of options
      const shuffledOptions = [...opties].sort(() => Math.random() - 0.5);

      shuffledOptions.forEach(option => {
        const btn = document.createElement('button');
        btn.className = 'optionBtn';
        btn.textContent = option;

        btn.addEventListener('click', () => {
          if (btn.classList.contains('disabled')) return;

          if (option === correct) {
            btn.classList.add('correct');

            if (XENITH && XENITH.FEEDBACK && XENITH.FEEDBACK.showSuccess) {
              XENITH.FEEDBACK.showSuccess({
                container: document.getElementById('x_pageDiv'),
                message: 'goed gedaan!',
                showConfetti: true,
                playSound: true
              });
              // also show our full-width sliding feedback bar
              showFeedback('Goed gedaan!', 'success', 2500);
            } else {
              playSuccess();
              launchConfetti();
              successMsg.style.display = 'block';
              showFeedback('Goed gedaan!', 'success', 2500);
            }
            // lock all buttons after correct
            const allBtns = document.querySelectorAll('.optionBtn');
            allBtns.forEach(b => b.classList.add('disabled'));
            if (window.wtRecordAttempt) window.wtRecordAttempt('woordtrainerQuiz', correct, true);
          } else {
            btn.classList.add('wrong');
            playError();
            // briefly show red, then allow another try
            setTimeout(() => {
              btn.classList.remove('wrong');
            }, 700);
            // show a brief try-again bar sliding up
            showFeedback('Probeer nog eens', 'error', 1200);
            if (window.wtRecordAttempt) window.wtRecordAttempt('woordtrainerQuiz', correct, false, option);
          }
        });

        optionsGrid.appendChild(btn);
      });

      right.appendChild(optionsGrid);
      layout.appendChild(left);
      layout.appendChild(right);
      container.appendChild(layout);
      // Centered status under layout
      const centerBar = document.createElement('div');
      centerBar.className = 'centerBar';
      centerBar.appendChild(successMsg);
      container.appendChild(centerBar);
    }
  };

  woordtrainerQuiz.init();
</script>
