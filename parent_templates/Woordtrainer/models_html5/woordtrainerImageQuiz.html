<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script type="text/javascript">
  var woordtrainerImageQuiz = new function () {
    this.init = function () {
      document.getElementById('x_pageDiv').firstChild.style.visibility = 'visible';

      const wrapper = document.getElementById('quizWrapper');
      if (!wrapper) return;

      const intro = x_currentPageXML.getAttribute('text') || '';

      const vraag = x_currentPageXML.getAttribute('woordItemText') || '';
      const opties = (x_currentPageXML.getAttribute('woordItemOptions') || '').split('|');
      const correct = x_currentPageXML.getAttribute('woordItemCorrect') || '';
      const imageHtml = x_currentPageXML.getAttribute('woordItemImageHtml') || '';
      const image = x_currentPageXML.getAttribute('img') || '';
      const retryLabel = x_currentPageXML.getAttribute('retryBtnTxt') || 'probeer opnieuw';

      if (opties.length < 2 || !correct || !image) {
        wrapper.querySelector('.quizContainer').innerHTML = '<p style="color:red;">Onvolledige quizgegevens.</p>';
        return;
      }

      renderQuestion(vraag, opties, correct, image, retryLabel);
    };

    function playSuccess() {
      const audio = new Audio("https://fedducate.nl/sounds/correct.mp3");
      audio.play();
    }

    function playError() {
      const audio = new Audio("https://fedducate.nl/sounds/error.mp3");
      audio.play();
    }

    function launchConfetti() {
      confetti({
        particleCount: 100,
        spread: 70,
        origin: { y: 0.6 }
      });
      setTimeout(() => confetti.reset(), 1000);
    }

    function renderQuestion(vraag, opties, correct, image, retryLabel) {
      const container = document.querySelector('.quizContainer');
      container.innerHTML = '';

      const vraagEl = document.createElement('div');
      vraagEl.className = 'quizQuestion';
      vraagEl.textContent = vraag;
      container.appendChild(vraagEl);

      const layout = document.createElement('div');
      layout.className = 'quizLayout';

      const left = document.createElement('div');
      left.className = 'quizImage';
      const img = document.createElement('img');
      img.src = image;
      img.alt = 'Quizafbeelding';
      left.appendChild(img);



      const right = document.createElement('div');
      right.className = 'quizOptions';

      const optionsGrid = document.createElement('div');
      optionsGrid.className = 'optionsGrid';

      const retryBtn = document.createElement('button');
      retryBtn.className = 'retryBtn';
      retryBtn.textContent = retryLabel;
      retryBtn.style.display = 'none';
      retryBtn.addEventListener('click', () => {
        woordtrainerImageQuiz.init();
      });

      const successMsg = document.createElement('div');
      successMsg.className = 'successMsg';
      successMsg.textContent = 'dit is correct!';
      successMsg.style.display = 'none';

      // Randomize the order of options
      const shuffledOptions = [...opties].sort(() => Math.random() - 0.5);

      shuffledOptions.forEach(option => {
        const btn = document.createElement('button');
        btn.className = 'optionBtn';
        btn.textContent = option;

        btn.addEventListener('click', () => {
          if (btn.classList.contains('disabled')) return;

          const allBtns = document.querySelectorAll('.optionBtn');
          allBtns.forEach(b => b.classList.add('disabled'));

          if (option === correct) {
            btn.classList.add('correct');

            playSuccess();
            launchConfetti();
            successMsg.style.display = 'block'; // 👈 show success message
            if (window.wtRecordAttempt) window.wtRecordAttempt('woordtrainerImageQuiz', correct, true);
          } else {
            btn.classList.add('wrong');
            playError();
            retryBtn.style.display = 'inline-block';
            if (window.wtRecordAttempt) window.wtRecordAttempt('woordtrainerImageQuiz', correct, false, option);
          }
        });

        optionsGrid.appendChild(btn);
      });

      right.appendChild(optionsGrid);
      layout.appendChild(left);
      layout.appendChild(right);
      container.appendChild(layout);
      // Centered status under layout
      const centerBar = document.createElement('div');
      centerBar.className = 'centerBar';
      centerBar.appendChild(successMsg);
      centerBar.appendChild(retryBtn);
      container.appendChild(centerBar);
    }
  };

  woordtrainerImageQuiz.init();
</script>

<div id="quizWrapper" class="general-wrapper">
  <div class="introText">Kies het juiste woord bij de afbeelding.</div>
  <div class="quizContainer"></div>
</div>
