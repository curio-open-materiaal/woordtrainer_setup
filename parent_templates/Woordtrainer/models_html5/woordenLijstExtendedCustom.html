<script type="text/javascript">
    var woordenLijstExtendedCustom = new function () {
        const MAX_SELECTED_WORDS = 15;
        let allAvailableWords = [];
        let selectedWords = [];
        
        // Strip HTML tags from text
        const stripHtml = function(html) {
            if (!html) return '';
            const tmp = document.createElement('DIV');
            tmp.innerHTML = html;
            return tmp.textContent || tmp.innerText || '';
        };

        // Parse word list text into word objects
        function parseWordListText(wordListText) {
            const words = [];
            if (!wordListText || wordListText.trim() === '') return words;
            
            let wordBlocks = wordListText.split(/\n\s*\n/);
            
            if (wordBlocks.length === 1) {
                const allLines = wordListText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
                wordBlocks = [];
                let currentBlock = [];
                
                allLines.forEach((line) => {
                    const wordMatch = line.match(/^([^:]+):(.+)$/);
                    const isNewWord = wordMatch && !line.toLowerCase().startsWith('contextzin');
                    
                    if (isNewWord && currentBlock.length > 0) {
                        wordBlocks.push(currentBlock.join('\n'));
                        currentBlock = [line];
                    } else {
                        currentBlock.push(line);
                    }
                });
                
                if (currentBlock.length > 0) {
                    wordBlocks.push(currentBlock.join('\n'));
                }
            }
            
            wordBlocks.forEach(block => {
                const lines = block.split('\n').map(l => l.trim()).filter(l => l.length > 0);
                if (lines.length === 0) return;
                
                let word = '';
                let betekenis = '';
                let contextzinExpliciet = '';
                let contextzinImpliciet = '';
                
                lines.forEach(line => {
                    const wordMatch = line.match(/^([^:]+):(.+)$/);
                    if (wordMatch && !line.toLowerCase().startsWith('contextzin')) {
                        word = stripHtml(wordMatch[1].trim());
                        betekenis = stripHtml(wordMatch[2].trim());
                    } else if (line.toLowerCase().startsWith('contextzin (i):')) {
                        contextzinImpliciet = stripHtml(line.substring(15).trim());
                    } else if (line.toLowerCase().startsWith('contextzin (e):')) {
                        contextzinExpliciet = stripHtml(line.substring(15).trim());
                    }
                });
                
                if (word) {
                    const wordLower = word.toLowerCase().trim();
                    if (!words.find(w => w.word.toLowerCase().trim() === wordLower)) {
                        words.push({
                            word: word,
                            betekenis: betekenis,
                            contextzinExpliciet: contextzinExpliciet,
                            contextzinImpliciet: contextzinImpliciet,
                            audioWoord: '',
                            audioBetekenis: '',
                            audioContextExpliciet: '',
                            audioContextImpliciet: ''
                        });
                    }
                }
            });
            
            return words;
        }

        // Collect all words from all woordenLijstExtended pages in the project
        function collectAllWordsFromProject() {
            const words = [];
            
            console.log('=== woordenLijstExtendedCustom: Starting word collection ===');
            
            // First, get words from the current page's wordListText field
            if (typeof x_currentPageXML !== 'undefined' && x_currentPageXML) {
                const currentPageWordListText = x_currentPageXML.getAttribute('wordListText') || '';
                if (currentPageWordListText && currentPageWordListText.trim() !== '') {
                    console.log('Found wordListText in current page, length:', currentPageWordListText.length);
                    const currentPageWords = parseWordListText(currentPageWordListText);
                    console.log('Parsed', currentPageWords.length, 'words from current page');
                    words.push(...currentPageWords);
                }
            }
            
            try {
                console.log('Checking x_pages availability...');
                console.log('typeof x_pages:', typeof x_pages);
                console.log('x_pages:', x_pages);
                console.log('x_pages.length:', x_pages ? x_pages.length : 'N/A');
                
                if (typeof x_pages === 'undefined' || !x_pages || x_pages.length === 0) {
                    console.warn('woordenLijstExtendedCustom: x_pages not available');
                    return words;
                }
                
                console.log('Found', x_pages.length, 'pages to check');
                
                for (let i = 0; i < x_pages.length; i++) {
                    const pageXML = x_pages[i];
                    console.log('--- Checking page', i, '---');
                    console.log('pageXML:', pageXML);
                    console.log('pageXML type:', typeof pageXML);
                    console.log('pageXML.getAttribute:', typeof pageXML.getAttribute);
                    
                    if (!pageXML) {
                        console.log('Page', i, 'is null/undefined');
                        continue;
                    }
                    
                    if (typeof pageXML.getAttribute !== 'function') {
                        console.log('Page', i, 'does not have getAttribute function');
                        // Try jQuery method
                        if (typeof $ !== 'undefined' && $(pageXML).length > 0) {
                            console.log('Trying jQuery method for page', i);
                            const $page = $(pageXML);
                            const tagName = $page.prop('tagName') || $page.prop('nodeName') || '';
                            console.log('jQuery tagName:', tagName);
                        }
                        continue;
                    }
                    
                    let tagName = '';
                    if (pageXML.tagName) {
                        tagName = pageXML.tagName.toLowerCase();
                        console.log('Page', i, 'tagName (tagName):', tagName);
                    } else if (pageXML.nodeName) {
                        tagName = pageXML.nodeName.toLowerCase();
                        console.log('Page', i, 'tagName (nodeName):', tagName);
                    } else if (pageXML.localName) {
                        tagName = pageXML.localName.toLowerCase();
                        console.log('Page', i, 'tagName (localName):', tagName);
                    } else {
                        // Try jQuery
                        if (typeof $ !== 'undefined') {
                            const $page = $(pageXML);
                            tagName = ($page.prop('tagName') || $page.prop('nodeName') || '').toLowerCase();
                            console.log('Page', i, 'tagName (jQuery):', tagName);
                        }
                    }
                    
                    console.log('Page', i, 'final tagName:', tagName);
                    
                    const isWordListPage = tagName === 'woordenlijstextended' || 
                                          tagName === 'woordenlijst extended' ||
                                          tagName === 'woordenlijstextended';
                    
                    console.log('Page', i, 'isWordListPage:', isWordListPage);
                    
                    if (isWordListPage) {
                        console.log('Page', i, 'is a woordenLijstExtended page!');
                        const wordListText = pageXML.getAttribute('wordListText') || '';
                        console.log('Page', i, 'wordListText length:', wordListText.length);
                        console.log('Page', i, 'wordListText preview:', wordListText.substring(0, 100));
                        
                        if (!wordListText || wordListText.trim() === '') {
                            console.log('Page', i, 'has empty wordListText');
                            continue;
                        }
                        
                        // Use the parseWordListText function
                        const pageWords = parseWordListText(wordListText);
                        console.log('Page', i, 'parsed', pageWords.length, 'words');
                        
                        // Add words, avoiding duplicates
                        pageWords.forEach(wordData => {
                            const wordLower = wordData.word.toLowerCase().trim();
                            if (!words.find(w => w.word.toLowerCase().trim() === wordLower)) {
                                words.push(wordData);
                                console.log('Added word:', wordData.word);
                            } else {
                                console.log('Skipped duplicate word:', wordData.word);
                            }
                        });
                        
                        console.log('Page', i, 'total words extracted so far:', words.length);
                    } else {
                        console.log('Page', i, 'is NOT a woordenLijstExtended page (tagName:', tagName, ')');
                    }
                }
            } catch (e) {
                console.error('woordenLijstExtendedCustom: Error collecting words:', e);
                console.error('Error stack:', e.stack);
            }
            
            console.log('=== woordenLijstExtendedCustom: Finished word collection ===');
            console.log('Total words found:', words.length);
            console.log('Words:', words.map(w => w.word));
            
            words.sort((a, b) => a.word.toLowerCase().localeCompare(b.word.toLowerCase()));
            return words;
        }

        // Load selected words from localStorage
        function loadSelectedWords() {
            try {
                const saved = localStorage.getItem('wt:customWordSet');
                if (saved) {
                    selectedWords = JSON.parse(saved);
                }
            } catch(e) {
                selectedWords = [];
            }
        }

        // Save selected words to localStorage
        function saveSelectedWords() {
            try {
                localStorage.setItem('wt:customWordSet', JSON.stringify(selectedWords));
            } catch(e) {}
        }

        // Check if word is selected
        function isWordSelected(word) {
            const wordLower = word.toLowerCase().trim();
            return selectedWords.some(w => w.word.toLowerCase().trim() === wordLower);
        }

        // Toggle word selection
        function toggleWordSelection(wordData) {
            const wordLower = wordData.word.toLowerCase().trim();
            const index = selectedWords.findIndex(w => w.word.toLowerCase().trim() === wordLower);
            
            if (index >= 0) {
                selectedWords.splice(index, 1);
            } else {
                if (selectedWords.length < MAX_SELECTED_WORDS) {
                    selectedWords.push(wordData);
                } else {
                    alert(`Je kunt maximaal ${MAX_SELECTED_WORDS} woorden selecteren.`);
                    return false;
                }
            }
            
            return true;
        }

        // Build practice summary (same as woordenLijstExtended)
        const buildPracticeSummary = function() {
            try {
                const map = {};
                
                if (typeof window.wtGetGlobalWordStats === 'function') {
                    try {
                        const globalStats = JSON.parse(localStorage.getItem('wt:globalWordStats') || '{}');
                        Object.keys(globalStats).forEach(wordKey => {
                            const stats = globalStats[wordKey];
                            if (stats && (stats.right > 0 || stats.wrong > 0)) {
                                map[wordKey] = {
                                    right: Number(stats.right || 0),
                                    wrong: Number(stats.wrong || 0)
                                };
                            }
                        });
                    } catch(e) {}
                }
                
                const prefix = `wt:stats:${location.pathname}`;
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (!key || !key.startsWith(prefix)) continue;
                    let stats = {};
                    try { stats = JSON.parse(localStorage.getItem(key) || '{}'); } catch(e) { stats = {}; }
                    Object.values(stats).forEach(v => {
                        const w = (v && v.word) ? String(v.word).trim().toLowerCase() : null;
                        if (!w) return;
                        const right = Number(v.rightCount || 0);
                        const wrong = Number(v.wrongCount || (Array.isArray(v.wrong) ? v.wrong.length : 0));
                        if (!map[w]) map[w] = { right: 0, wrong: 0 };
                        map[w].right += isNaN(right) ? 0 : right;
                        map[w].wrong += isNaN(wrong) ? 0 : wrong;
                    });
                }
                return map;
            } catch (e) { return {}; }
        };

        // Apply progress colors to word elements
        const applyProgressToElement = function(p, practiceSummary) {
            const key = p.dataset.word ? p.dataset.word.trim().toLowerCase() : p.textContent.trim().toLowerCase();
            const stats = practiceSummary[key];
            if (!stats) return;
            
            const total = stats.right + stats.wrong;
            if (total === 0) return;
            
            const ratio = stats.right / total;
            let colorType = 'needs-practice';
            if (ratio >= 0.8 && total >= 3) {
                colorType = 'controlled';
            } else if (ratio >= 0.6 && total >= 2) {
                colorType = 'learning';
            }
            
            p.style.backgroundColor = colorType === 'controlled' ? '#d4edda' : 
                                     colorType === 'learning' ? '#fff3cd' : '#f8d7da';
            p.style.borderColor = colorType === 'controlled' ? '#28a745' : 
                                 colorType === 'learning' ? '#ffc107' : '#dc3545';
        };

        // Show word modal (same as woordenLijstExtended)
        const showWordModal = function(wordData) {
            const modal = document.createElement('div');
            modal.className = 'word-modal';
            
            const content = document.createElement('div');
            content.className = 'word-modal-content';
            
            const close = document.createElement('button');
            close.className = 'word-modal-close';
            close.innerHTML = '&times;';
            close.addEventListener('click', () => modal.remove());
            
            const mainContent = document.createElement('div');
            mainContent.className = 'word-modal-main-content';
            
            const wordCard = document.createElement('div');
            wordCard.className = 'word-modal-card';
            wordCard.innerHTML = `<h4>Woord</h4><p>${stripHtml(wordData.word)}</p>`;
            mainContent.appendChild(wordCard);
            
            if (wordData.betekenis) {
                const betekenisCard = document.createElement('div');
                betekenisCard.className = 'word-modal-card';
                betekenisCard.innerHTML = `<h4>Betekenis</h4><p>${stripHtml(wordData.betekenis)}</p>`;
                mainContent.appendChild(betekenisCard);
            }
            
            if (wordData.contextzinExpliciet) {
                const contextCard = document.createElement('div');
                contextCard.className = 'word-modal-card';
                contextCard.innerHTML = `<h4>Voorbeeldzin</h4><p>${stripHtml(wordData.contextzinExpliciet)}</p>`;
                mainContent.appendChild(contextCard);
            }
            
            content.appendChild(close);
            content.appendChild(mainContent);
            modal.appendChild(content);
            document.body.appendChild(modal);
            
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.remove();
            });
        };

        // Render word list (same style as woordenLijstExtended)
        function renderWordList() {
            const container = document.getElementById('wordListContainer');
            if (!container) return;
            
            // Remove existing word list
            const existingWordList = container.querySelector('.wordList');
            if (existingWordList) {
                existingWordList.remove();
            }
            const existingBtn = container.querySelector('.select-words-button');
            if (existingBtn) {
                existingBtn.remove();
            }
            
            if (selectedWords.length === 0) {
                const message = document.createElement('p');
                const messageText = "Nog geen woorden geselecteerd. Klik op de knop hieronder om woorden te kiezen.";
                message.innerHTML = "<em>" + messageText + "</em>";
                message.style.cssText = 'text-align: center; color: #666; padding: 2rem;';
                container.appendChild(message);
                
                // Add translation below the message
                if (typeof x_addTranslationUnder === 'function') {
                    setTimeout(function() {
                        x_addTranslationUnder(message, messageText);
                    }, 100);
                }
            } else {
                const div = document.createElement('div');
                div.className = 'wordList';
                
                if (selectedWords.length >= 13) {
                    div.classList.add('compact');
                }
                
                function updateProgressBackgrounds() {
                    const summary = buildPracticeSummary();
                    document.querySelectorAll('.wordList p').forEach(p => applyProgressToElement(p, summary));
                }
                
                selectedWords.forEach(wordData => {
                    const p = document.createElement('p');
                    p.textContent = stripHtml(wordData.word);
                    p.dataset.word = stripHtml(wordData.word);
                    
                    const isSentence = wordData.word.indexOf(' ') !== -1;
                    if (!isSentence) {
                        p.style.textTransform = 'lowercase';
                    } else {
                        p.style.textTransform = 'none';
                    }
                    
                    p.addEventListener('click', () => {
                        showWordModal(wordData);
                        p.classList.remove('clicked');
                        void p.offsetWidth;
                        p.classList.add('clicked');
                    });
                    
                    div.appendChild(p);
                });
                
                container.appendChild(div);
                
                window.addEventListener('wt:statsUpdated', updateProgressBackgrounds, { passive: true });
                for (let i = 0; i < 4; i++) {
                    setTimeout(() => updateProgressBackgrounds(), 50 + i * 1000);
                }
            }
            
            // Add actions row: print + bekijk voortgang (same as woordenLijstExtended)
            const existingActions = container.querySelector('.woordenlijst-actions');
            if (existingActions) existingActions.remove();
            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'woordenlijst-actions';
            const printBtn = document.createElement('button');
            printBtn.className = 'print-button';
            printBtn.innerHTML = '<i class="fa fa-print" aria-hidden="true"></i> print woordenlijst';
            printBtn.addEventListener('click', () => printWordsListExtendedCustom(selectedWords));
            actionsDiv.appendChild(printBtn);
            const progressBtn = document.createElement('button');
            progressBtn.className = 'progress-button';
            progressBtn.innerHTML = '<i class="fa fa-chart-simple" aria-hidden="true"></i> bekijk voortgang';
            progressBtn.addEventListener('click', () => openProgressModalWoordenlijst(selectedWords));
            actionsDiv.appendChild(progressBtn);
            container.appendChild(actionsDiv);
            
            // Add select words button
            const selectBtn = document.createElement('button');
            selectBtn.className = 'select-words-button';
            selectBtn.textContent = selectedWords.length > 0 ? 'Wijzig woorden selectie' : 'Selecteer woorden';
            selectBtn.addEventListener('click', () => {
                openWordSelectionModal();
            });
            container.appendChild(selectBtn);
            
            // Update word count
            document.getElementById('amount-words').textContent = selectedWords.length;
        }
        
        function printWordsListExtendedCustom(words) {
            if (!words || words.length === 0) return;
            const printWindow = window.open('', '_blank');
            const projectTitle = document.querySelector('h1') ? document.querySelector('h1').textContent : 'Woordtrainer';
            const rows = words.map(function(w) {
                var cell = escapeHtmlProgress(w.word);
                if (w.meaning) cell += ' – ' + escapeHtmlProgress(w.meaning);
                return '<tr><td>' + cell + '</td></tr>';
            }).join('');
            printWindow.document.write('<!DOCTYPE html><html><head><title>Woordenlijst</title><style>body{font-family:sans-serif;padding:2rem;} table{width:100%;border-collapse:collapse;} td{padding:0.5rem;border-bottom:1px solid #eee;}</style></head><body><h1>woordenlijst</h1><p>' + escapeHtmlProgress(projectTitle) + '</p><table><tbody>' + rows + '</tbody></table></body></html>');
            printWindow.document.close();
            printWindow.onload = function() { printWindow.print(); printWindow.close(); };
        }
        
        function escapeHtmlProgress(text) {
            if (!text) return '';
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        function openProgressModalWoordenlijst(words) {
            var wordSet = {};
            for (var i = 0; i < words.length; i++) {
                var w = words[i];
                var wordStr = (w && w.word != null) ? String(w.word).trim() : '';
                var k = wordStr.toLowerCase();
                if (k && !wordSet[k]) wordSet[k] = wordStr;
            }
            var globalStatsData = {};
            try { globalStatsData = JSON.parse(localStorage.getItem('wt:globalWordStats') || '{}'); } catch (e) {}
            var byWordAll = {};
            for (var gk in globalStatsData) {
                if (globalStatsData.hasOwnProperty(gk)) {
                    var g = globalStatsData[gk];
                    byWordAll[gk] = { word: wordSet[gk] || gk, right: (g && typeof g.right === 'number') ? g.right : 0, wrong: (g && typeof g.wrong === 'number') ? g.wrong : 0 };
                }
            }
            for (var k in wordSet) {
                if (wordSet.hasOwnProperty(k) && !byWordAll[k]) byWordAll[k] = { word: wordSet[k], right: 0, wrong: 0 };
                else if (byWordAll[k] && wordSet[k]) byWordAll[k].word = wordSet[k];
            }
            var wordsForTable = [];
            for (var k in wordSet) {
                if (wordSet.hasOwnProperty(k)) wordsForTable.push({ word: wordSet[k], allRight: (byWordAll[k] && byWordAll[k].right) || 0, allWrong: (byWordAll[k] && byWordAll[k].wrong) || 0 });
            }
            if (wordsForTable.length === 0) {
                for (var k in byWordAll) { if (byWordAll.hasOwnProperty(k)) wordsForTable.push({ word: byWordAll[k].word, allRight: byWordAll[k].right || 0, allWrong: byWordAll[k].wrong || 0 }); }
            }
            wordsForTable.sort(function(a, b) { return a.word.localeCompare(b.word, 'nl'); });
            function renderTable() {
                var h = '<div class="progress-table-wrap"><table class="progress-table"><thead><tr><th>woord</th><th>goed</th><th>fout</th><th>totaal</th><th>%</th></tr></thead><tbody>';
                for (var i = 0; i < wordsForTable.length; i++) {
                    var w = wordsForTable[i];
                    var right = w.allRight || 0, wrong = w.allWrong || 0, total = right + wrong;
                    var pct = total > 0 ? Math.round((right / total) * 100) : '-';
                    h += '<tr><td class="progress-word">' + escapeHtmlProgress(w.word) + '</td><td class="progress-good">' + right + '</td><td class="progress-wrong">' + wrong + '</td><td>' + total + '</td><td class="progress-pct">' + pct + (total > 0 ? '%' : '') + '</td></tr>';
                }
                return h + '</tbody></table></div>';
            }
            var modal = document.getElementById('progressModalWoordenlijst');
            var content = document.getElementById('progressModalContentWoordenlijst');
            if (!modal || !content) return;
            content.innerHTML = '<h3 class="progress-modal-title">Voortgang per woord (algemeen)</h3>' + (wordsForTable.length === 0 ? '<p class="progress-row">Geen voortgang nog. Maak oefeningen om je resultaten te zien.</p>' : renderTable());
            modal.style.display = 'flex';
        }
        window.wtCloseProgressModal = function() { var m = document.getElementById('progressModalWoordenlijst'); if (m) m.style.display = 'none'; };

        // Open word selection modal
        function openWordSelectionModal() {
            const modal = document.createElement('div');
            modal.className = 'word-selection-modal';
            
            const content = document.createElement('div');
            content.className = 'word-selection-modal-content';
            
            const close = document.createElement('button');
            close.className = 'word-selection-modal-close';
            close.innerHTML = '&times;';
            close.addEventListener('click', () => modal.remove());
            
            const header = document.createElement('div');
            header.className = 'selection-header';
            
            const searchBox = document.createElement('input');
            searchBox.type = 'text';
            searchBox.className = 'search-box';
            searchBox.placeholder = 'Zoek woorden...';
            
            const counter = document.createElement('div');
            counter.className = 'selection-counter';
            counter.id = 'modalSelectionCounter';
            
            header.appendChild(searchBox);
            header.appendChild(counter);
            
            const wordsGrid = document.createElement('div');
            wordsGrid.className = 'words-grid';
            wordsGrid.id = 'modalWordsGrid';
            
            const actionButtons = document.createElement('div');
            actionButtons.className = 'modal-action-buttons';
            
            const saveBtn = document.createElement('button');
            saveBtn.className = 'modal-action-btn primary';
            saveBtn.textContent = 'Opslaan';
            saveBtn.id = 'modalSaveBtn';
            
            const cancelBtn = document.createElement('button');
            cancelBtn.className = 'modal-action-btn';
            cancelBtn.textContent = 'Annuleren';
            cancelBtn.style.cssText = 'background-color: #6c757d; color: white;';
            cancelBtn.addEventListener('click', () => modal.remove());
            
            actionButtons.appendChild(saveBtn);
            actionButtons.appendChild(cancelBtn);
            
            content.appendChild(close);
            content.appendChild(header);
            content.appendChild(wordsGrid);
            content.appendChild(actionButtons);
            modal.appendChild(content);
            document.body.appendChild(modal);
            
            // Store current selection for modal
            let modalSelectedWords = JSON.parse(JSON.stringify(selectedWords));
            
            // Render words in modal
            function renderModalWords() {
                const searchTerm = searchBox.value.toLowerCase();
                const filteredWords = allAvailableWords.filter(w => 
                    w.word.toLowerCase().includes(searchTerm) ||
                    (w.betekenis && w.betekenis.toLowerCase().includes(searchTerm))
                );
                
                counter.textContent = `${modalSelectedWords.length} van ${MAX_SELECTED_WORDS} geselecteerd`;
                
                wordsGrid.innerHTML = '';
                
                if (filteredWords.length === 0) {
                    wordsGrid.innerHTML = '<div style="text-align:center;color:#666;padding:2rem;">Geen woorden gevonden.</div>';
                } else {
                    filteredWords.forEach(wordData => {
                        const wordItem = document.createElement('div');
                        const isSelected = modalSelectedWords.some(w => w.word.toLowerCase().trim() === wordData.word.toLowerCase().trim());
                        wordItem.className = 'word-item' + (isSelected ? ' selected' : '');
                        
                        const checkbox = document.createElement('input');
                        checkbox.type = 'checkbox';
                        checkbox.id = `modal-word-${wordData.word}`;
                        checkbox.checked = isSelected;
                        checkbox.disabled = !isSelected && modalSelectedWords.length >= MAX_SELECTED_WORDS;
                        
                        const label = document.createElement('label');
                        label.htmlFor = checkbox.id;
                        label.textContent = wordData.word;
                        
                        wordItem.appendChild(checkbox);
                        wordItem.appendChild(label);
                        
                        wordItem.addEventListener('click', (e) => {
                            if (e.target.type !== 'checkbox') {
                                checkbox.checked = !checkbox.checked;
                            }
                            if (toggleWordSelectionInModal(wordData)) {
                                renderModalWords();
                            }
                        });
                        
                        checkbox.addEventListener('change', () => {
                            if (toggleWordSelectionInModal(wordData)) {
                                renderModalWords();
                            }
                        });
                        
                        wordsGrid.appendChild(wordItem);
                    });
                }
                
                saveBtn.disabled = modalSelectedWords.length === 0;
            }
            
            // Toggle word selection in modal
            function toggleWordSelectionInModal(wordData) {
                const wordLower = wordData.word.toLowerCase().trim();
                const index = modalSelectedWords.findIndex(w => w.word.toLowerCase().trim() === wordLower);
                
                if (index >= 0) {
                    modalSelectedWords.splice(index, 1);
                } else {
                    if (modalSelectedWords.length < MAX_SELECTED_WORDS) {
                        modalSelectedWords.push(wordData);
                    } else {
                        alert(`Je kunt maximaal ${MAX_SELECTED_WORDS} woorden selecteren.`);
                        return false;
                    }
                }
                
                return true;
            }
            
            searchBox.addEventListener('input', () => {
                renderModalWords();
            });
            
            saveBtn.addEventListener('click', () => {
                selectedWords = modalSelectedWords;
                saveSelectedWords();
                renderWordList();
                modal.remove();
            });
            
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.remove();
            });
            
            renderModalWords();
        }

        this.init = function () {
            window.scrollTo(0, 0);
            
            const tryInit = (attempt = 0) => {
                console.log('woordenLijstExtendedCustom: tryInit attempt', attempt);
                console.log('x_pages available:', typeof x_pages !== 'undefined');
                console.log('x_pages value:', x_pages);
                console.log('x_pages length:', x_pages ? x_pages.length : 'N/A');
                console.log('x_pageInfo available:', typeof x_pageInfo !== 'undefined');
                console.log('x_pageInfo value:', typeof x_pageInfo !== 'undefined' ? x_pageInfo : 'N/A');
                console.log('x_pageInfo length:', typeof x_pageInfo !== 'undefined' && x_pageInfo ? x_pageInfo.length : 'N/A');
                
                if (typeof x_pages !== 'undefined' && x_pages && x_pages.length > 0) {
                    console.log('x_pages is available, starting collection...');
                    allAvailableWords = collectAllWordsFromProject();
                    console.log('Collected', allAvailableWords.length, 'words');
                    loadSelectedWords();
                    renderWordList();
                } else if (attempt < 20) {
                    console.log('Waiting for x_pages... attempt', attempt + 1);
                    setTimeout(() => tryInit(attempt + 1), 100);
                } else {
                    console.error('woordenLijstExtendedCustom: x_pages not available after', attempt, 'attempts');
                    console.log('Final check - x_pages:', typeof x_pages !== 'undefined' ? x_pages : 'undefined');
                    console.log('Final check - x_pageInfo:', typeof x_pageInfo !== 'undefined' ? x_pageInfo : 'undefined');
                    const container = document.getElementById('wordListContainer');
                    if (container) {
                        const errorMsg = document.createElement('p');
                        errorMsg.style.cssText = 'color: red; padding: 1rem; text-align: center;';
                        errorMsg.textContent = 'Kon geen woorden vinden. Zorg ervoor dat er woordenlijstExtended pagina\'s in het project zijn. Open de browser console (F12) voor meer details.';
                        container.appendChild(errorMsg);
                    }
                }
            };
            
            tryInit();
            
            x_pageLoaded();
        };
    };

    if (typeof x_pageLoaded === 'function') {
        woordenLijstExtendedCustom.init();
    } else {
        setTimeout(() => {
            woordenLijstExtendedCustom.init();
        }, 200);
    }
    
    // Add translation for subtitle after page loads
    if (typeof x_addTranslationUnder === 'function') {
        setTimeout(function() {
            const subtitleEl = document.querySelector('.subtitle');
            if (subtitleEl) {
                const subtitleText = 'Klik op de woorden voor meer informatie';
                x_addTranslationUnder(subtitleEl, subtitleText);
            }
        }, 100);
    }
</script>

    </div>

</div>

    <div class="progress-modal-box">
        <button type="button" class="progress-modal-close" onclick="window.wtCloseProgressModal();" aria-label="Sluiten">&times;</button>
        <div id="progressModalContentWoordenlijst"></div>
    </div>
</div>
