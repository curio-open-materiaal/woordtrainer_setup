<script type="text/javascript">
  var woordenContext = new function () {
    let isReadingFull = false;

    this.init = function () {
      document.getElementById('x_pageDiv').firstChild.style.visibility = 'visible';

      const wrapper = document.getElementById('wcwrapper');
      const zin = x_currentPageXML.getAttribute('zin') || '';

      // Always ensure the sentence is inside a <p> within .zinContainer
      const zinContainer = wrapper.querySelector('.zinContainer');
      const zinTrimmed = zin.trim();
      if (zinTrimmed.toLowerCase().startsWith('<p')) {
        zinContainer.innerHTML = zinTrimmed;
      } else {
        zinContainer.innerHTML = '<p>' + zinTrimmed + '</p>';
      }

      const strongWords = wrapper.querySelectorAll('.zinContainer strong');
      strongWords.forEach(el => {
        el.classList.add('clickableWord');
        el.addEventListener('click', () => {
          if (!isReadingFull) {
            const word = el.textContent.trim();
            // Remove highlight from all words
            strongWords.forEach(w => w.classList.remove('highlight'));
            // Highlight clicked word
            el.classList.add('highlight');
            stopAudio(); // Prevent overdub
            playText(word);
            // Remove highlight after audio plays
            setTimeout(() => {
              el.classList.remove('highlight');
            }, 2000);
          }
        });
      });

      wrapper.querySelector('#leesZinBtn').addEventListener('click', () => {
        isReadingFull = true;
        stopAudio();
        const fullText = wrapper.querySelector('.zinContainer').innerText.trim();
        playText(fullText);
        isReadingFull = false;
      });
    };
  };

  woordenContext.init();
</script>

<div id="wcwrapper" class="general-wrapper">
  <div class="zinContainer"></div>
  <button id="leesZinBtn" class="voorleesKnop">lees de zin voor</button>
</div>

    /* font-size: 1.4em !important; */
